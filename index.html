<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <title>Mohammad Mujahid's 3-D Skills Constellation Chart</title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
  />

  <style>
    @font-face {
      font-family: "FoundationTitlesHand";
      src: url("./FoundationTitlesHand.ttf") format("truetype");
      font-display: swap;
      font-style: normal;
      font-weight: normal;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #010108;
    }

    body {
      position: relative;
      font-family: "FoundationTitlesHand", Arial, sans-serif;
    }

    /* Visible deep-space background */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;

      background:
        radial-gradient(
          circle at 20% 24%,
          rgba(80, 55, 180, 0.24) 0%,
          rgba(55, 38, 145, 0.09) 22%,
          transparent 45%
        ),
        radial-gradient(
          circle at 78% 66%,
          rgba(25, 115, 195, 0.20) 0%,
          rgba(20, 65, 145, 0.08) 24%,
          transparent 48%
        ),
        radial-gradient(
          circle at 50% 45%,
          rgba(30, 25, 90, 0.30) 0%,
          rgba(8, 8, 35, 0.78) 42%,
          #010108 100%
        );
    }

    /* Soft nebula glow */
    body::after {
      content: "";
      position: fixed;
      inset: -20%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.55;

      background:
        radial-gradient(
          ellipse at 35% 55%,
          rgba(104, 75, 210, 0.12),
          transparent 38%
        ),
        radial-gradient(
          ellipse at 65% 40%,
          rgba(50, 145, 225, 0.10),
          transparent 40%
        );

      filter: blur(35px);
      animation: nebulaDrift 24s ease-in-out infinite alternate;
    }

    @keyframes nebulaDrift {
      0% {
        transform: translate3d(-2%, -1%, 0) scale(1);
      }

      100% {
        transform: translate3d(2%, 1%, 0) scale(1.08);
      }
    }

    #graph {
      position: fixed;
      inset: 0;
      z-index: 1;

      width: 100vw;
      height: 100vh;

      display: block;
      touch-action: none;
      cursor: grab;
    }

    #graph:active {
      cursor: grabbing;
    }

    #graph canvas {
      display: block;
      background: transparent !important;
      outline: none;
    }

    #refreshBtn {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 20;

      width: 52px;
      height: 52px;

      display: flex;
      align-items: center;
      justify-content: center;

      border: 1px solid rgba(190, 220, 255, 0.14);
      border-radius: 50%;

      background: rgba(255, 255, 255, 0.09);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);

      color: #ffffff;
      font-family: Arial, sans-serif;
      font-size: 24px;
      line-height: 1;

      cursor: pointer;

      box-shadow:
        0 4px 18px rgba(110, 165, 255, 0.28),
        inset 0 0 14px rgba(255, 255, 255, 0.04);

      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease,
        background 0.2s ease;
    }

    #refreshBtn:hover {
      transform: scale(1.08);
      background: rgba(255, 255, 255, 0.15);

      box-shadow:
        0 6px 24px rgba(160, 205, 255, 0.46),
        inset 0 0 16px rgba(255, 255, 255, 0.06);
    }

    #refreshBtn:active {
      transform: scale(0.95);
    }

    #hint {
      position: fixed;
      left: 18px;
      bottom: 18px;
      z-index: 20;

      color: rgba(220, 235, 255, 0.68);
      font-family: Arial, sans-serif;
      font-size: 12px;
      letter-spacing: 0.3px;

      user-select: none;
      pointer-events: none;

      text-shadow: 0 0 10px rgba(100, 165, 255, 0.48);
    }

    #loading {
      position: fixed;
      inset: 0;
      z-index: 50;

      display: flex;
      align-items: center;
      justify-content: center;

      background:
        radial-gradient(
          circle at center,
          rgba(10, 10, 42, 0.96),
          rgba(1, 1, 8, 0.99)
        );

      color: rgba(220, 238, 255, 0.92);
      font-family: "FoundationTitlesHand", Arial, sans-serif;
      font-size: clamp(30px, 5vw, 58px);
      letter-spacing: 1px;

      transition:
        opacity 1.2s ease,
        visibility 1.2s ease;
    }

    #loading.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    @media (max-width: 768px) {
      #hint {
        left: 12px;
        bottom: 12px;
        max-width: calc(100vw - 90px);
        font-size: 10px;
        line-height: 1.4;
      }

      #refreshBtn {
        right: 15px;
        bottom: 15px;
        width: 48px;
        height: 48px;
        font-size: 22px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      body::after {
        animation: none;
      }
    }
  </style>
</head>

    // =====================================================
    // GRAPH DATA
    // =====================================================

    const nodes = skills.map((skill, index) => ({
      id: index,
      skill: skill

    const links = [];

    for (let i = 1; i < nodes.length; i++) {
      links.push({
        source: i,
        target: Math.floor(Math.random() * i)
      });

      // Occasional secondary connection for a richer galaxy network
      if (i > 5 && i % 5 === 0) {
        links.push({
          source: i,
          target: Math.floor(Math.random() * i)
        });
      }
    }

    const gData = {
      nodes: nodes,
      links: links
    };

    // =====================================================
    // GLOBAL REFERENCES
    // =====================================================

    let Graph = null;
    let camera = null;
    let controls = null;

    let galaxyStars = null;
    let farNebulaStars = null;
    let dustCloud = null;

    let animationFrameId = null;
    let introCompleted = false;
    let userInteracting = false;
    let autoTravelEnabled = false;
    let focusedNode = null;

    let lastInteractionTime = performance.now();
    let travelTime = 0;
    let previousFrameTime = performance.now();

    // =====================================================
    // LOAD FONT AND START
    // =====================================================

    async function startApplication() {
      try {
        if (document.fonts && document.fonts.load) {
          await document.fonts.load(
            `${LABEL_FONT_SIZE}px "FoundationTitlesHand"`
          );

          await document.fonts.ready;
        }
      } catch (error) {
        console.warn("Custom font could not be preloaded.", error);
      }

      initGalaxy();
    }

    startApplication();

    // =====================================================
    // INITIALIZE GALAXY
    // =====================================================

    function initGalaxy() {
      const graphElement = document.getElementById("graph");

      Graph = ForceGraph3D({
        controlType: "orbit",
        rendererConfig: {
          alpha: true,
          antialias: !isMobile,
          powerPreference: "high-performance"
        }
      })(graphElement);

      Graph
        .width(window.innerWidth)
        .height(window.innerHeight)
        .graphData(gData)
        .backgroundColor("rgba(0,0,0,0)")
        .showNavInfo(false)
        .cooldownTicks(isMobile ? 130 : 170)
        .d3AlphaDecay(0.022)
        .d3VelocityDecay(0.3);

      const renderer = Graph.renderer();

      renderer.setPixelRatio(
        Math.min(window.devicePixelRatio || 1, isMobile ? 1.35 : 1.75)
      );

      renderer.setClearColor(0x000000, 0);

      const scene = Graph.scene();

      // Reduced fog so the deep-space background remains visible
      scene.fog = new THREE.FogExp2(0x030312, 0.000115);

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.9);
      scene.add(ambientLight);

      createGalaxyStarfield(scene);
      configureNodes();
      configureLinks();
      configureForces();
      configureCamera();
      configureInteraction();
      configureEvents();

      startIntroSequence();
      startAnimationLoop();
    }

    // =====================================================
    // NODE OBJECTS
    // =====================================================

    function configureNodes() {
      const starTextureCache = new Map();

      const starPalettes = [
        {
          core: "rgba(255,255,235,1)",
          middle: "rgba(255,221,120,0.90)",
          glow: "rgba(255,175,55,0)"
        },
        {
          core: "rgba(235,252,255,1)",
          middle: "rgba(120,220,255,0.84)",
          glow: "rgba(70,150,255,0)"
        },
        {
          core: "rgba(255,245,255,1)",
          middle: "rgba(210,165,255,0.82)",
          glow: "rgba(145,90,255,0)"
        },
        {
          core: "rgba(245,255,240,1)",
          middle: "rgba(155,255,205,0.78)",
          glow: "rgba(70,245,175,0)"
        }
      ];

      function createStarTexture(paletteIndex) {
        if (starTextureCache.has(paletteIndex)) {
          return starTextureCache.get(paletteIndex);
        }

        const palette = starPalettes[paletteIndex];

        const canvas = document.createElement("canvas");
        canvas.width = 96;
        canvas.height = 96;

        const context = canvas.getContext("2d");

        const gradient = context.createRadialGradient(
          48,
          48,
          0,
          48,
          48,
          48
        );

        gradient.addColorStop(0, palette.core);
        gradient.addColorStop(0.13, palette.core);
        gradient.addColorStop(0.34, palette.middle);
        gradient.addColorStop(0.62, "rgba(255,210,120,0.20)");
        gradient.addColorStop(1, palette.glow);

        context.fillStyle = gradient;
        context.fillRect(0, 0, 96, 96);

        const texture = new THREE.CanvasTexture(canvas);
        texture.minFilter = THREE.LinearFilter;
        texture.magFilter = THREE.LinearFilter;
        texture.needsUpdate = true;

        starTextureCache.set(paletteIndex, texture);

        return texture;
      }

      function createLabelTexture(text) {
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");

        const fontDeclaration =
          `${LABEL_FONT_SIZE}px "FoundationTitlesHand", Arial, sans-serif`;

        context.font = fontDeclaration;

        const measuredWidth = Math.ceil(context.measureText(text).width);

        canvas.width = Math.max(80, measuredWidth + 52);
        canvas.height = LABEL_FONT_SIZE + 38;

        context.clearRect(0, 0, canvas.width, canvas.height);

        context.font = fontDeclaration;
        context.textAlign = "center";
        context.textBaseline = "middle";

        context.shadowColor = "rgba(80,175,255,0.95)";
        context.shadowBlur = isMobile ? 10 : 15;

        context.fillStyle = "rgba(226,241,255,0.98)";

        context.fillText(
          text,
          canvas.width / 2,
          canvas.height / 2
        );

        const texture = new THREE.CanvasTexture(canvas);

        texture.minFilter = THREE.LinearFilter;
        texture.magFilter = THREE.LinearFilter;
        texture.needsUpdate = true;

        return {
          texture: texture,
          width: canvas.width,
          height: canvas.height
        };
      }

      Graph.nodeThreeObject((node) => {
        const group = new THREE.Group();

        const paletteIndex = node.id % starPalettes.length;
        const starTexture = createStarTexture(paletteIndex);

        const starMaterial = new THREE.SpriteMaterial({
          map: starTexture,
          transparent: true,
          opacity: 0.96,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        });

        const starSprite = new THREE.Sprite(starMaterial);

        const majorStar = node.id % 19 === 0;
        const mediumStar = node.id % 8 === 0;

        const nodeScale = majorStar
          ? 1.55
          : mediumStar
            ? 1.22
            : 1;

        starSprite.scale.set(
          STAR_SIZE * nodeScale,
          STAR_SIZE * nodeScale,
          1
        );

        group.add(starSprite);

        if (SHOW_LABELS) {
          const labelData = createLabelTexture(node.skill);

          const labelMaterial = new THREE.SpriteMaterial({
            map: labelData.texture,
            transparent: true,
            opacity: isMobile ? 0.87 : 0.93,
            depthWrite: false
          });

          const labelSprite = new THREE.Sprite(labelMaterial);

          labelSprite.position.set(
            0,
            isMobile ? 8.8 : 10.5,
            0
          );

          const labelScale = isMobile ? 0.049 : 0.052;

          labelSprite.scale.set(
            labelData.width * labelScale,
            labelData.height * labelScale,
            1
          );

          group.add(labelSprite);

          node.__label = labelSprite;
          node.__labelMaterial = labelMaterial;
        }

        node.__threeObj = group;
        node.__starSprite = starSprite;
        node.__starMaterial = starMaterial;
        node.__baseStarScale = STAR_SIZE * nodeScale;
        node.__phase = node.id * 0.61;

        return group;
      });
    }

    // =====================================================
    // CONSTELLATION LINKS
    // =====================================================

    function configureLinks() {
      Graph
        .linkWidth(0.72)
        .linkColor(() => "rgba(125,165,255,0.16)")
        .linkOpacity(1)
        .linkDirectionalParticles(isMobile ? 1 : 2)
        .linkDirectionalParticleWidth(PARTICLE_WIDTH)
        .linkDirectionalParticleSpeed(() => PARTICLE_SPEED)
        .linkDirectionalParticleColor(
          () => `rgba(255,242,195,${PARTICLE_OPACITY})`
        );
    }

    // =====================================================
    // GALAXY FORCE SHAPE
    // =====================================================

    function configureForces() {
      const linkForce = Graph.d3Force("link");
      const chargeForce = Graph.d3Force("charge");

      if (linkForce) {
        linkForce.distance(isMobile ? 35 : 42);
        linkForce.strength(0.5);
      }

      if (chargeForce) {
        chargeForce.strength(isMobile ? -16 : -22);
        chargeForce.distanceMax(isMobile ? 420 : 520);
      }

      // Gentle spiral pull that shapes the skills like a galaxy
      Graph.d3Force("galaxy", (alpha) => {
        const currentNodes = Graph.graphData().nodes;
        const total = Math.max(currentNodes.length, 1);

        currentNodes.forEach((node, index) => {
          if (
            typeof node.x !== "number" ||
            typeof node.y !== "number" ||
            typeof node.z !== "number"
          ) {
            return;
          }

          const normalizedIndex = index / total;
          const arm = index % 4;

          const radius =
            24 +
            Math.sqrt(normalizedIndex) *
              (isMobile ? 235 : 310);

          const angle =
            normalizedIndex * Math.PI * 9 +
            arm * (Math.PI / 2);

          const targetX = Math.cos(angle) * radius;
          const targetZ = Math.sin(angle) * radius;

          const verticalWave =
            Math.sin(angle * 1.7) *
            (isMobile ? 24 : 34);

          const forceStrength = 0.0065 * alpha;

          node.vx += (targetX - node.x) * forceStrength;
          node.vz += (targetZ - node.z) * forceStrength;
          node.vy += (verticalWave - node.y) * forceStrength;
        });
      });
    }

    // =====================================================
    // CAMERA AND CONTROLS
    // =====================================================

    function configureCamera() {
      camera = Graph.camera();
      controls = Graph.controls();

      camera.near = 0.1;
      camera.far = 25000;
      camera.updateProjectionMatrix();

      controls.enableDamping = true;
      controls.dampingFactor = 0.075;

      controls.enableRotate = true;
      controls.enableZoom = true;
      controls.enablePan = true;

      controls.rotateSpeed = 0.58;
      controls.zoomSpeed = 1.05;
      controls.panSpeed = 0.72;

      controls.minDistance = 45;
      controls.maxDistance = 2800;

      controls.screenSpacePanning = true;

      // Initial viewpoint: galaxy is clearly visible, not extremely distant
      Graph.cameraPosition({
        x: isMobile ? 160 : 220,
        y: isMobile ? 90 : 130,
        z: isMobile ? 760 : 820
      });
    }

    // =====================================================
    // USER INTERACTION
    // =====================================================

    function configureInteraction() {
      function beginInteraction() {
        userInteracting = true;
        autoTravelEnabled = false;
        focusedNode = null;
        lastInteractionTime = performance.now();
      }

      function continueInteraction() {
        if (userInteracting) {
          lastInteractionTime = performance.now();
        }
      }

      function endInteraction() {
        userInteracting = false;
        lastInteractionTime = performance.now();
      }

      controls.addEventListener("start", beginInteraction);
      controls.addEventListener("change", continueInteraction);
      controls.addEventListener("end", endInteraction);

      const graphElement = document.getElementById("graph");

      graphElement.addEventListener(
        "wheel",
        () => {
          autoTravelEnabled = false;
          focusedNode = null;
          lastInteractionTime = performance.now();
        },
        { passive: true }
      );

      graphElement.addEventListener(
        "touchstart",
        () => {
          autoTravelEnabled = false;
          focusedNode = null;
          lastInteractionTime = performance.now();
        },
        { passive: true }
      );
    }

    // =====================================================
    // GRAPH EVENTS
    // =====================================================

    function configureEvents() {
      Graph.onNodeHover((node) => {
        document.body.style.cursor = node ? "pointer" : "grab";

        Graph.graphData().nodes.forEach((currentNode) => {
          if (currentNode.__labelMaterial) {
            currentNode.__labelMaterial.opacity = isMobile
              ? 0.82
              : 0.89;
          }

          if (currentNode.__starMaterial) {
            currentNode.__starMaterial.opacity = 0.94;
          }
        });

        if (node) {
          if (node.__labelMaterial) {
            node.__labelMaterial.opacity = 1;
          }

          if (node.__starMaterial) {
            node.__starMaterial.opacity = 1;
          }
        }
      });

      Graph.onNodeClick((node) => {
        if (!node) {
          return;
        }

        focusedNode = node;
        autoTravelEnabled = false;
        lastInteractionTime = performance.now();

        const nodeX = Number.isFinite(node.x) ? node.x : 0;
        const nodeY = Number.isFinite(node.y) ? node.y : 0;
        const nodeZ = Number.isFinite(node.z) ? node.z : 0;

        const currentCameraPosition = camera.position.clone();
        const nodePosition = new THREE.Vector3(
          nodeX,
          nodeY,
          nodeZ
        );

        const direction = currentCameraPosition
          .clone()
          .sub(nodePosition)
          .normalize();

        if (direction.lengthSq() === 0) {
          direction.set(0, 0, 1);
        }

        const focusDistance = isMobile ? 105 : 88;

        const destination = nodePosition
          .clone()
          .add(direction.multiplyScalar(focusDistance));

        Graph.cameraPosition(
          {
            x: destination.x,
            y: destination.y,
            z: destination.z
          },
          {
            x: nodeX,
            y: nodeY,
            z: nodeZ
          },
          1800
        );
      });

      document
        .getElementById("refreshBtn")
        .addEventListener("click", resetGalaxyView);
    }

    // =====================================================
    // INTRO SEQUENCE
    // =====================================================

    function startIntroSequence() {
      const loadingScreen = document.getElementById("loading");

      setTimeout(() => {
        loadingScreen.classList.add("hidden");
      }, 550);

      // Begin with the complete galaxy visible
      setTimeout(() => {
        Graph.zoomToFit(
          1400,
          isMobile ? 95 : 115
        );
      }, 500);

      // Then move inward to create an "entering the galaxy" effect
      setTimeout(() => {
        Graph.cameraPosition(
          {
            x: isMobile ? 155 : 205,
            y: isMobile ? 55 : 80,
            z: isMobile ? 390 : 420
          },
          {
            x: 0,
            y: 0,
            z: 0
          },
          prefersReducedMotion ? 600 : 3200
        );
      }, 2100);

      // Start automatic cinematic travel after the intro
      setTimeout(() => {
        introCompleted = true;
        autoTravelEnabled = !prefersReducedMotion;
        lastInteractionTime = performance.now();
      }, prefersReducedMotion ? 3000 : 5700);
    }

    // =====================================================
    // RESET VIEW
    // =====================================================

    function resetGalaxyView() {
      focusedNode = null;
      userInteracting = false;
      autoTravelEnabled = false;
      lastInteractionTime = performance.now();

      Graph.cameraPosition(
        {
          x: isMobile ? 170 : 220,
          y: isMobile ? 70 : 95,
          z: isMobile ? 430 : 470
        },
        {
          x: 0,
          y: 0,
          z: 0
        },
        1500
      );
    }

    // =====================================================
    // AUTOMATIC CINEMATIC TRAVEL
    // =====================================================

    function updateCinematicTravel(deltaTime) {
      if (
        !introCompleted ||
        userInteracting ||
        focusedNode ||
        prefersReducedMotion
      ) {
        return;
      }

      const idleDuration =
        performance.now() - lastInteractionTime;

      if (idleDuration > AUTO_TRAVEL_IDLE_DELAY) {
        autoTravelEnabled = true;
      }

      if (!autoTravelEnabled) {
        return;
      }

      travelTime += deltaTime * AUTO_TRAVEL_SPEED;

      // In-and-out movement through the skills
      const depthWave =
        Math.sin(travelTime * 0.72) * (isMobile ? 105 : 145);

      const secondaryDepthWave =
        Math.sin(travelTime * 0.31) * (isMobile ? 45 : 65);

      const radius =
        (isMobile ? 365 : 410) +
        depthWave +
        secondaryDepthWave;

      // Slow path around the entire galaxy
      const horizontalAngle = travelTime;
      const verticalAngle = travelTime * 0.47;

      const targetX =
        Math.sin(travelTime * 0.28) *
        (isMobile ? 55 : 85);

      const targetY =
        Math.cos(travelTime * 0.39) *
        (isMobile ? 28 : 45);

      const targetZ =
        Math.sin(travelTime * 0.21) *
        (isMobile ? 45 : 70);

      camera.position.x =
        Math.cos(horizontalAngle) * radius;

      camera.position.z =
        Math.sin(horizontalAngle) * radius;

      camera.position.y =
        Math.sin(verticalAngle) *
        (isMobile ? 95 : 135);

      camera.lookAt(targetX, targetY, targetZ);
    }

    // =====================================================
    // SWIRLING NETWORK
    // =====================================================

    function updateGalaxySwirl(deltaTime, elapsedTime) {
      if (!Graph || prefersReducedMotion) {
        return;
      }

      const currentNodes = Graph.graphData().nodes;

      // Small rotational force keeps the entire network alive
      const swirlStrength = deltaTime * 0.0000065;

      currentNodes.forEach((node) => {
        if (
          typeof node.x !== "number" ||
          typeof node.y !== "number" ||
          typeof node.z !== "number"
        ) {
          return;
        }

        const radius = Math.hypot(node.x, node.z) || 1;

        // Tangential velocity creates the galaxy rotation
        node.vx =
          (node.vx || 0) -
          node.z * swirlStrength;

        node.vz =
          (node.vz || 0) +
          node.x * swirlStrength;

        // Gentle vertical oscillation
        node.vy =
          (node.vy || 0) +
          Math.sin(
            elapsedTime * 0.00045 +
            node.__phase +
            radius * 0.008
          ) *
          0.00065 *
          Math.min(deltaTime, 24);
      });
    }

    // =====================================================
    // NODE ANIMATION
    // =====================================================

    function updateNodeAnimation(elapsedTime) {
      if (!Graph) {
        return;
      }

      const time = elapsedTime * 0.001;

      Graph.graphData().nodes.forEach((node) => {
        if (!node.__threeObj || !node.__starSprite) {
          return;
        }

        const breathing =
          1 +
          Math.sin(time * 1.12 + node.__phase) *
          0.045;

        const starScale =
          node.__baseStarScale * breathing;

        node.__starSprite.scale.set(
          starScale,
          starScale,
          1
        );

        if (node.__label) {
          const labelMovement =
            Math.sin(time * 0.75 + node.__phase) *
            0.45;

          node.__label.position.y =
            (isMobile ? 8.8 : 10.5) +
            labelMovement;
        }
      });
    }

    // =====================================================
    // BACKGROUND ANIMATION
    // =====================================================

    function updateBackgroundAnimation(deltaTime) {
      if (prefersReducedMotion) {
        return;
      }

      const frameFactor = Math.min(deltaTime / 16.667, 2);

      if (galaxyStars) {
        galaxyStars.rotation.y += 0.000018 * frameFactor;
        galaxyStars.rotation.x += 0.000004 * frameFactor;
      }

      if (farNebulaStars) {
        farNebulaStars.rotation.y -= 0.000009 * frameFactor;
        farNebulaStars.rotation.z += 0.000003 * frameFactor;
      }

      if (dustCloud) {
        dustCloud.rotation.z += 0.000006 * frameFactor;
        dustCloud.rotation.y += 0.000004 * frameFactor;
      }
    }

    // =====================================================
    // ANIMATION LOOP
    // =====================================================

    function startAnimationLoop() {
      function animate(currentTime) {
        animationFrameId = requestAnimationFrame(animate);

        const deltaTime = Math.min(
          currentTime - previousFrameTime,
          32
        );

        previousFrameTime = currentTime;

        updateGalaxySwirl(deltaTime, currentTime);
        updateCinematicTravel(deltaTime);
        updateNodeAnimation(currentTime);
        updateBackgroundAnimation(deltaTime);
      }

      animationFrameId = requestAnimationFrame(animate);
    }

    // =====================================================
    // DEEP-SPACE STARFIELD
    // =====================================================

    function createGalaxyStarfield(scene) {
      createNearStars(scene);
      createFarStars(scene);
      createGalaxyDust(scene);
    }

    function createNearStars(scene) {
      const geometry = new THREE.BufferGeometry();

      const nearCount = isMobile ? 1500 : 3000;
      const positions = new Float32Array(nearCount * 3);
      const colors = new Float32Array(nearCount * 3);

      const white = new THREE.Color("#ffffff");
      const blue = new THREE.Color("#9edbff");
      const gold = new THREE.Color("#fff1ad");
      const violet = new THREE.Color("#c9b2ff");

      const availableColors = [
        white,
        blue,
        gold,
        violet
      ];

      for (let i = 0; i < nearCount; i++) {
        const index = i * 3;

        positions[index] =
          (Math.random() - 0.5) * 7000;

        positions[index + 1] =
          (Math.random() - 0.5) * 7000;

        positions[index + 2] =
          (Math.random() - 0.5) * 7000;

        const selectedColor =
          availableColors[
            Math.floor(Math.random() * availableColors.length)
          ];

        colors[index] = selectedColor.r;
        colors[index + 1] = selectedColor.g;
        colors[index + 2] = selectedColor.b;
      }

      geometry.setAttribute(
        "position",
        new THREE.BufferAttribute(positions, 3)
      );

      geometry.setAttribute(
        "color",
        new THREE.BufferAttribute(colors, 3)
      );

      const material = new THREE.PointsMaterial({
        size: isMobile ? 1.15 : 1.42,
        sizeAttenuation: true,
        vertexColors: true,
        transparent: true,
        opacity: 0.86,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });

      galaxyStars = new THREE.Points(
        geometry,
        material
      );

      scene.add(galaxyStars);
    }

    function createFarStars(scene) {
      const geometry = new THREE.BufferGeometry();

      const farCount = isMobile ? 900 : 1700;
      const positions = new Float32Array(farCount * 3);

      for (let i = 0; i < farCount; i++) {
        const index = i * 3;

        positions[index] =
          (Math.random() - 0.5) * 15000;

        positions[index + 1] =
          (Math.random() - 0.5) * 15000;

        positions[index + 2] =
          (Math.random() - 0.5) * 15000;
      }

      geometry.setAttribute(
        "position",
        new THREE.BufferAttribute(positions, 3)
      );

      const material = new THREE.PointsMaterial({
        size: isMobile ? 0.72 : 0.92,
        sizeAttenuation: true,
        color: "#7da8ff",
        transparent: true,
        opacity: 0.54,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });

      farNebulaStars = new THREE.Points(
        geometry,
        material
      );

      scene.add(farNebulaStars);
    }

    function createGalaxyDust(scene) {
      const geometry = new THREE.BufferGeometry();

      const dustCount = isMobile ? 600 : 1200;
      const positions = new Float32Array(dustCount * 3);
      const colors = new Float32Array(dustCount * 3);

      const purple = new THREE.Color("#7060cc");
      const blue = new THREE.Color("#408ccc");

      for (let i = 0; i < dustCount; i++) {
        const index = i * 3;

        const angle = Math.random() * Math.PI * 2;
        const radius =
          300 +
          Math.pow(Math.random(), 0.65) * 2800;

        positions[index] =
          Math.cos(angle) * radius;

        positions[index + 1] =
          (Math.random() - 0.5) * 500;

        positions[index + 2] =
          Math.sin(angle) * radius;

        const selectedColor =
          i % 2 === 0 ? purple : blue;

        colors[index] = selectedColor.r;
        colors[index + 1] = selectedColor.g;
        colors[index + 2] = selectedColor.b;
      }

      geometry.setAttribute(
        "position",
        new THREE.BufferAttribute(positions, 3)
      );

      geometry.setAttribute(
        "color",
        new THREE.BufferAttribute(colors, 3)
      );

      const material = new THREE.PointsMaterial({
        size: isMobile ? 1.4 : 1.8,
        sizeAttenuation: true,
        vertexColors: true,
        transparent: true,
        opacity: 0.18,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });

      dustCloud = new THREE.Points(
        geometry,
        material
      );

      dustCloud.rotation.x = -0.2;

      scene.add(dustCloud);
    }

    // =====================================================
    // RESPONSIVE RESIZE
    // =====================================================

    let resizeTimer = null;

    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);

      resizeTimer = setTimeout(() => {
        if (!Graph) {
          return;
        }

        Graph.width(window.innerWidth);
        Graph.height(window.innerHeight);

        if (camera) {
          camera.aspect =
            window.innerWidth / window.innerHeight;

          camera.updateProjectionMatrix();
        }
      }, 120);
    });

    // =====================================================
    // CLEANUP
    // =====================================================

    window.addEventListener("beforeunload", () => {
      if (animationFrameId) {
        cancelAnimationFrame(animationFrameId);
      }
    });
  </script>
</body>
