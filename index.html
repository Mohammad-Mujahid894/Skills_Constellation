  "Vendor Risk Assessment", "Power Automate", "Google App Script", "Power Apps", "Month-End Closing", "Statutory Compliance Reporting"

// ==============================================

const N = skills.length;

const gData = {

    nodes: [...Array(N).keys()].map(i => ({
        id: i,
        skill: skills[i]
    })),

    links: [...Array(N).keys()]
    .filter(i => i)
    .map(i => ({
        source: i,
        target: Math.round(Math.random()*(i-1))
    }))
};

// ==============================================
// CREATE GRAPH
// ==============================================

const Graph = ForceGraph3D({
    controlType:'orbit'
})(document.getElementById('3d-graph'));

Graph.graphData(gData);

Graph.renderer().setPixelRatio(
    Math.min(window.devicePixelRatio,2)
);

// ==============================================
// DEEP SPACE STARFIELD
// ==============================================

const scene = Graph.scene();

const starsGeometry =
    new THREE.BufferGeometry();

const starVertices = [];

for(let i=0;i<2500;i++){

    starVertices.push(
        (Math.random()-0.5)*8000,
        (Math.random()-0.5)*8000,
        (Math.random()-0.5)*8000
    );

}

starsGeometry.setAttribute(
    'position',
    new THREE.Float32BufferAttribute(
        starVertices,
        3
    )
);

const starsMaterial =
    new THREE.PointsMaterial({

        color:0xffffff,
        size:1.4,
        transparent:true,
        opacity:0.8

    });

const starField =
    new THREE.Points(
        starsGeometry,
        starsMaterial
    );

scene.add(starField);

// ==============================================
// NODES
// ==============================================

Graph.nodeThreeObject(node => {

    const group =
        new THREE.Group();

    const starCanvas =
        document.createElement('canvas');

    starCanvas.width = 64;
    starCanvas.height = 64;

    const ctx =
        starCanvas.getContext('2d');

    const gradient =
        ctx.createRadialGradient(
            32,32,0,
            32,32,32
        );

    gradient.addColorStop(
        0,
        'rgba(255,255,220,1)'
    );

    gradient.addColorStop(
        0.3,
        'rgba(255,220,120,0.9)'
    );

    gradient.addColorStop(
        0.6,
        'rgba(255,180,60,0.45)'
    );

    gradient.addColorStop(
        1,
        'rgba(255,180,60,0)'
    );

    ctx.fillStyle = gradient;
    ctx.fillRect(0,0,64,64);

    const texture =
        new THREE.CanvasTexture(
            starCanvas
        );

    const sprite =
        new THREE.Sprite(

            new THREE.SpriteMaterial({
                map:texture,
                transparent:true
            })

        );

    sprite.scale.set(
        STAR_SIZE,
        STAR_SIZE,
        1
    );

    group.add(sprite);

    // LABEL

    const labelCanvas =
        document.createElement('canvas');

    const labelCtx =
        labelCanvas.getContext('2d');

    labelCtx.font =
        `${LABEL_FONT_SIZE}px MyCustomFont`;

    const text = node.skill;

    const width =
        labelCtx.measureText(text).width;

    labelCanvas.width =
        width + 20;

    labelCanvas.height =
        LABEL_FONT_SIZE + 15;

    labelCtx.font =
        `${LABEL_FONT_SIZE}px MyCustomFont`;

    labelCtx.fillStyle =
        '#cce6ff';

    labelCtx.fillText(
        text,
        5,
        LABEL_FONT_SIZE
    );

    const labelTexture =
        new THREE.CanvasTexture(
            labelCanvas
        );

    const label =
        new THREE.Sprite(

            new THREE.SpriteMaterial({

                map:labelTexture,
                transparent:true

            })

        );

    label.position.set(
        0,
        15,
        0
    );

    label.scale.set(
        labelCanvas.width * 0.06,
        labelCanvas.height * 0.06,
        1
    );

    label.visible = false;

    group.add(label);

    node.__label = label;
    node.__threeObj = group;

    return group;

});

// ==============================================
// LINKS
// ==============================================

Graph
.linkWidth(1)
.linkColor(
    () =>
    'rgba(120,170,255,0.12)'
)
.linkOpacity(1)
.linkDirectionalParticles(2)
.linkDirectionalParticleWidth(1)
.linkDirectionalParticleSpeed(
    () => 0.001
)
.linkDirectionalParticleColor(
    () =>
    'rgba(255,246,200,0.30)'
);

// ==============================================
// HOVER LABELS
// ==============================================

Graph.onNodeHover(node => {

    document.body.style.cursor =
        node ? 'pointer' : null;

    Graph.graphData().nodes.forEach(n => {

        if(n.__label)
            n.__label.visible = false;

    });

    if(node?.__label)
        node.__label.visible = true;

});

// ==============================================
// CLICK TO FLY
// ==============================================

Graph.onNodeClick(node => {

    const distance = 120;

    const distRatio =
        1 + distance /
        Math.hypot(
            node.x || 1,
            node.y || 1,
            node.z || 1
        );

    Graph.cameraPosition(

        {
            x: node.x * distRatio,
            y: node.y * distRatio,
            z: node.z * distRatio
        },

        node,

        2500

    );

    userInteraction();

});

// ==============================================
// FORCE SETTINGS
// ==============================================

Graph.d3Force('link')
.distance(45);

Graph.d3Force('charge')
.strength(-25);

// ==============================================
// CONTROLS
// ==============================================

Graph.cameraPosition({
    x:0,
    y:0,
    z:900
});

const controls =
    Graph.controls();

controls.enableDamping = true;
controls.dampingFactor = 0.1;

controls.enableRotate = true;
controls.enableZoom = true;
controls.enablePan = true;

controls.rotateSpeed = 0.6;
controls.zoomSpeed = 0.9;
controls.panSpeed = 0.7;

controls.minDistance = 80;
controls.maxDistance = 3000;

const cam =
    Graph.camera();

// ==============================================
// CINEMATIC ORBIT
// ==============================================

let lastInteractionTime =
    Date.now();

let autoOrbitEnabled = true;

function userInteraction(){

    lastInteractionTime =
        Date.now();

    autoOrbitEnabled =
        false;
}

controls.addEventListener(
    'start',
    userInteraction
);

controls.addEventListener(
    'change',
    userInteraction
);

let orbitAngle = 0;

function autoOrbit(){

    if(
      Date.now() -
      lastInteractionTime >
      15000
    ){
        autoOrbitEnabled =
            true;
    }

    if(!autoOrbitEnabled)
        return;

    orbitAngle += 0.00008;

    const radius = 900;

    cam.position.x =
        Math.cos(orbitAngle)
        * radius;

    cam.position.z =
        Math.sin(orbitAngle)
        * radius;

    cam.lookAt(0,0,0);
}

// ==============================================
// STAR PULSE
// ==============================================

function animateStars(){

    const t =
        Date.now()*0.001;

    Graph.graphData()
    .nodes
    .forEach(node => {

        if(!node.__threeObj)
            return;

        const scale =
            1 +
            Math.sin(
                t + node.id
            ) * 0.04;

        node.__threeObj.scale.set(
            scale,
            scale,
            scale
        );

    });

}

// ==============================================
// MAIN LOOP
// ==============================================

function animateLoop(){

    requestAnimationFrame(
        animateLoop
    );

    autoOrbit();

    animateStars();
}

animateLoop();

// ==============================================
// REFRESH BUTTON
// ==============================================

document
.getElementById('refreshBtn')
.addEventListener('click', () => {

    Graph.zoomToFit(1500);

});
