<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <title>Mohammad Mujahid's 3-D Skills Constellation Chart</title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
  />

  <style>
    @font-face {
      font-family: "FoundationTitlesHand";
      src: url("./FoundationTitlesHand.ttf") format("truetype");
      font-display: swap;
      font-style: normal;
      font-weight: normal;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #010108;
    }

    body {
      position: relative;
      font-family: "FoundationTitlesHand", Arial, sans-serif;
    }

    /* Deep-space background with reduced central blue brightness */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;

      background:
        radial-gradient(
          circle at 18% 24%,
          rgba(72, 48, 150, 0.12) 0%,
          rgba(42, 28, 100, 0.04) 25%,
          transparent 47%
        ),
        radial-gradient(
          circle at 80% 68%,
          rgba(20, 72, 135, 0.07) 0%,
          rgba(12, 40, 90, 0.025) 26%,
          transparent 49%
        ),
        radial-gradient(
          circle at 50% 46%,
          rgba(17, 16, 54, 0.14) 0%,
          rgba(5, 5, 25, 0.75) 44%,
          #010108 100%
        );
    }

    body::after {
      content: "";
      position: fixed;
      inset: -15%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.19;

      background:
        radial-gradient(
          ellipse at 32% 58%,
          rgba(88, 62, 175, 0.07),
          transparent 42%
        ),
        radial-gradient(
          ellipse at 68% 39%,
          rgba(38, 95, 160, 0.045),
          transparent 44%
        );

      filter: blur(42px);
      animation: nebulaDrift 32s ease-in-out infinite alternate;
    }

    @keyframes nebulaDrift {
      from {
        transform: translate3d(-1.2%, -0.8%, 0) scale(1);
      }

      to {
        transform: translate3d(1.2%, 0.8%, 0) scale(1.04);
      }
    }

    #graph {
      position: fixed;
      inset: 0;
      z-index: 1;

      width: 100vw;
      height: 100vh;

      display: block;
      touch-action: none;
      cursor: grab;
    }

    #graph:active {
      cursor: grabbing;
    }

    #graph canvas {
      display: block;
      background: transparent !important;
      outline: none;
    }

    #refreshBtn {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 20;

      width: 50px;
      height: 50px;

      display: flex;
      align-items: center;
      justify-content: center;

      padding: 0;

      border: 1px solid rgba(205, 225, 255, 0.12);
      border-radius: 50%;

      background: rgba(255, 255, 255, 0.075);

      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);

      color: #ffffff;
      font-family: Arial, sans-serif;
      font-size: 23px;
      line-height: 1;

      cursor: pointer;

      box-shadow:
        0 4px 18px rgba(90, 145, 235, 0.2),
        inset 0 0 12px rgba(255, 255, 255, 0.035);

      transition:
        transform 0.2s ease,
        background 0.2s ease,
        box-shadow 0.2s ease;
    }

    #refreshBtn:hover {
      transform: scale(1.08);
      background: rgba(255, 255, 255, 0.13);

      box-shadow:
        0 6px 22px rgba(135, 185, 255, 0.35),
        inset 0 0 14px rgba(255, 255, 255, 0.05);
    }

    #refreshBtn:active {
      transform: scale(0.95);
    }

    #hint {
      position: fixed;
      left: 18px;
      bottom: 18px;
      z-index: 20;

      color: rgba(220, 235, 255, 0.6);
      font-family: Arial, sans-serif;
      font-size: 12px;
      letter-spacing: 0.3px;

      user-select: none;
      pointer-events: none;

      text-shadow: 0 0 9px rgba(90, 145, 230, 0.38);
    }

    #loading {
      position: fixed;
      inset: 0;
      z-index: 50;

      display: flex;
      align-items: center;
      justify-content: center;

      background:
        radial-gradient(
          circle at center,
          rgba(9, 9, 35, 0.98),
          rgba(1, 1, 8, 1)
        );

      color: rgba(225, 240, 255, 0.92);

      font-family:
        "FoundationTitlesHand",
        Arial,
        sans-serif;

      font-size: clamp(30px, 5vw, 58px);
      letter-spacing: 1px;

      transition:
        opacity 1s ease,
        visibility 1s ease;
    }

    #loading.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    @media (max-width: 768px) {
      body::after {
        display: none;
      }

      #hint {
        left: 12px;
        bottom: 12px;
        max-width: calc(100vw - 84px);
        font-size: 10px;
        line-height: 1.4;
      }

      #refreshBtn {
        right: 15px;
        bottom: 15px;
        width: 46px;
        height: 46px;
        font-size: 21px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      body::after {
        animation: none;
      }
    }
  </style>
</head>

    // =====================================================

    async function startApplication() {

          );

          error
        );
      }

      initializeGalaxy();

    // =====================================================
    // INITIALIZE GALAXY
    // =====================================================

    function initializeGalaxy() {
      const graphElement =
        document.getElementById("graph");

      Graph = ForceGraph3D({
        controlType: "orbit",

        rendererConfig: {
          alpha: true,
          antialias: false,
          powerPreference: "high-performance"
        }
      })(graphElement);

      Graph
        .width(window.innerWidth)
        .height(window.innerHeight)
        .graphData(graphData)
        .backgroundColor("rgba(0,0,0,0)")
        .showNavInfo(false)
        .cooldownTicks(isMobile ? 90 : 120)
        .d3AlphaDecay(0.028)
        .d3VelocityDecay(0.34);

      const renderer = Graph.renderer();

      renderer.setPixelRatio(
        Math.min(
          window.devicePixelRatio || 1,
          isMobile ? 1.05 : 1.3
        )
      );

      renderer.setClearColor(0x000000, 0);

      const scene = Graph.scene();

      scene.fog = new THREE.FogExp2(
        0x02020d,
        0.000085
      );

      const ambientLight =
        new THREE.AmbientLight(0xffffff, 0.8);

      scene.add(ambientLight);

      createDeepSpace(scene);
      configureNodes();
      configureLinks();
      configureForces();
      configureCamera();
      configureInteractions();
      configureGraphEvents();

      startIntro();
      startAnimationLoop();
    }

    // =====================================================
    // NODE OBJECTS
    // =====================================================

    function configureNodes() {
      const starTextureCache = new Map();

      /*
        The first palette is the main orange/gold palette.
        Most stars will use this palette.
      */
      const palettes = [
        {
          core: "rgba(255,255,225,1)",
          middle: "rgba(255,195,72,0.96)",
          innerGlow: "rgba(255,145,28,0.52)",
          outer: "rgba(255,112,15,0)"
        },
        {
          core: "rgba(235,252,255,1)",
          middle: "rgba(120,220,255,0.8)",
          innerGlow: "rgba(65,155,255,0.35)",
          outer: "rgba(60,135,255,0)"
        },
        {
          core: "rgba(255,245,255,1)",
          middle: "rgba(210,165,255,0.78)",
          innerGlow: "rgba(165,100,255,0.32)",
          outer: "rgba(140,80,255,0)"
        },
        {
          core: "rgba(245,255,240,1)",
          middle: "rgba(155,255,205,0.74)",
          innerGlow: "rgba(85,225,155,0.3)",
          outer: "rgba(60,210,150,0)"
        }
      ];

      function getPaletteIndex(nodeId) {
        /*
          Deterministic distribution:
          Approximately 85% orange without using
          constantly changing random colours.
        */
        const distributionValue =
          ((nodeId * 37) % 100) / 100;

        if (
          distributionValue <
          ORANGE_STAR_PERCENTAGE
        ) {
          return 0;
        }

        return 1 + (nodeId % 3);
      }

      function createStarTexture(paletteIndex) {
        if (starTextureCache.has(paletteIndex)) {
          return starTextureCache.get(paletteIndex);
        }

        const palette = palettes[paletteIndex];

        const canvas =
          document.createElement("canvas");

        canvas.width = 64;
        canvas.height = 64;

        const context =
          canvas.getContext("2d");

        const gradient =
          context.createRadialGradient(
            32,
            32,
            0,
            32,
            32,
            32
          );

        gradient.addColorStop(
          0,
          palette.core
        );

        gradient.addColorStop(
          0.13,
          palette.core
        );

        gradient.addColorStop(
          0.34,
          palette.middle
        );

        gradient.addColorStop(
          0.62,
          palette.innerGlow
        );

        gradient.addColorStop(
          1,
          palette.outer
        );

        context.fillStyle = gradient;

        context.fillRect(
          0,
          0,
          canvas.width,
          canvas.height
        );

        const texture =
          new THREE.CanvasTexture(canvas);

        texture.minFilter = THREE.LinearFilter;
        texture.magFilter = THREE.LinearFilter;
        texture.generateMipmaps = false;
        texture.needsUpdate = true;

        starTextureCache.set(
          paletteIndex,
          texture
        );

        return texture;
      }

      function createLabelTexture(text) {
        const canvas =
          document.createElement("canvas");

        const context =
          canvas.getContext("2d");

        const fontDeclaration =
          `${LABEL_FONT_SIZE}px ` +
          `"FoundationTitlesHand", Arial, sans-serif`;

        context.font = fontDeclaration;

        const measuredWidth = Math.ceil(
          context.measureText(text).width
        );

        canvas.width = Math.min(
          1024,
          Math.max(
            100,
            measuredWidth + 42
          )
        );

        canvas.height =
          LABEL_FONT_SIZE + 30;

        context.clearRect(
          0,
          0,
          canvas.width,
          canvas.height
        );

        context.font = fontDeclaration;
        context.textAlign = "center";
        context.textBaseline = "middle";

        context.shadowColor =
          "rgba(75,145,220,0.52)";

        context.shadowBlur = isMobile ? 5 : 8;

        context.fillStyle =
          "rgba(225,240,255,0.96)";

        context.fillText(
          text,
          canvas.width / 2,
          canvas.height / 2
        );

        const texture =
          new THREE.CanvasTexture(canvas);

        texture.minFilter = THREE.LinearFilter;
        texture.magFilter = THREE.LinearFilter;
        texture.generateMipmaps = false;
        texture.needsUpdate = true;

        return {
          texture,
          width: canvas.width,
          height: canvas.height
        };
      }

      Graph.nodeThreeObject((node) => {
        const group = new THREE.Group();

        const paletteIndex =
          getPaletteIndex(node.id);

        const starMaterial =
          new THREE.SpriteMaterial({
            map: createStarTexture(paletteIndex),
            transparent: true,
            opacity: 0.96,
            depthWrite: false,
            blending: THREE.AdditiveBlending
          });

        const star =
          new THREE.Sprite(starMaterial);

        const sizeMultiplier =
          node.importance === 3
            ? 1.52
            : node.importance === 2
              ? 1.22
              : 1;

        const baseStarSize =
          STAR_SIZE * sizeMultiplier;

        star.scale.set(
          baseStarSize,
          baseStarSize,
          1
        );

        group.add(star);

        if (SHOW_LABELS) {
          const labelData =
            createLabelTexture(node.skill);

          const labelMaterial =
            new THREE.SpriteMaterial({
              map: labelData.texture,
              transparent: true,
              opacity: 0,
              depthWrite: false
            });

          const label =
            new THREE.Sprite(labelMaterial);

          label.position.set(
            0,
            isMobile ? 8 : 9.5,
            0
          );

          label.scale.set(
            labelData.width *
              LABEL_DISPLAY_SCALE,

            labelData.height *
              LABEL_DISPLAY_SCALE,

            1
          );

          label.visible = false;

          group.add(label);

          node.__label = label;
          node.__labelMaterial =
            labelMaterial;
        }

        node.__group = group;
        node.__star = star;
        node.__starMaterial = starMaterial;

        node.__baseStarSize =
          baseStarSize;

        node.__phase =
          node.id * 0.67;

        return group;
      });
    }

    // =====================================================
    // CONSTELLATION LINKS
    // All flowing particles are disabled here.
    // =====================================================

    function configureLinks() {
      Graph
        .linkWidth(0.52)
        .linkColor(
          () => "rgba(115,150,225,0.105)"
        )
        .linkOpacity(1)

        /*
          Zero particles removes the glittering dots
          that previously travelled along the lines.
        */
        .linkDirectionalParticles(0);
    }

    // =====================================================
    // SPACIOUS GALAXY FORCES
    // =====================================================

    function configureForces() {
      const linkForce =
        Graph.d3Force("link");

      const chargeForce =
        Graph.d3Force("charge");

      if (linkForce) {
        linkForce
          .distance(isMobile ? 76 : 96)
          .strength(0.27);
      }

      if (chargeForce) {
        chargeForce
          .strength(isMobile ? -45 : -62)
          .distanceMax(
            isMobile ? 800 : 1100
          );
      }

      Graph.d3Force(
        "spaciousGalaxy",
        (alpha) => {
          const currentNodes =
            Graph.graphData().nodes;

          const total = Math.max(
            currentNodes.length,
            1
          );

          for (
            let index = 0;
            index < currentNodes.length;
            index++
          ) {
            const node =
              currentNodes[index];

            if (
              !Number.isFinite(node.x) ||
              !Number.isFinite(node.y) ||
              !Number.isFinite(node.z)
            ) {
              continue;
            }

            const progress =
              (index + 1) / total;

            const arm =
              index % 5;

            const radius =
              75 +
              Math.sqrt(progress) *
                GALAXY_RADIUS;

            const angle =
              progress *
                Math.PI *
                11 +
              arm *
                ((Math.PI * 2) / 5);

            const targetX =
              Math.cos(angle) * radius;

            const targetZ =
              Math.sin(angle) * radius;

            /*
              Larger depth variation creates a genuinely
              three-dimensional galaxy rather than a flat disc.
            */
            const targetY =
              Math.sin(angle * 1.45) *
                (isMobile ? 95 : 145) +
              Math.cos(angle * 0.57) *
                (isMobile ? 45 : 70);

            const strength =
              0.0038 * alpha;

            node.vx +=
              (targetX - node.x) *
              strength;

            node.vy +=
              (targetY - node.y) *
              strength;

            node.vz +=
              (targetZ - node.z) *
              strength;
          }
        }
      );
    }

    // =====================================================
    // CAMERA
    // =====================================================

    function configureCamera() {
      camera = Graph.camera();
      controls = Graph.controls();

      camera.near = 0.1;
      camera.far = 25000;
      camera.updateProjectionMatrix();

      controls.enableDamping = true;
      controls.dampingFactor = 0.065;

      controls.enableRotate = true;
      controls.enableZoom = true;
      controls.enablePan = true;

      controls.rotateSpeed = 0.55;
      controls.zoomSpeed = 0.95;
      controls.panSpeed = 0.68;

      controls.minDistance = 48;
      controls.maxDistance = 4000;

      controls.screenSpacePanning = true;

      Graph.cameraPosition({
        x: isMobile ? 250 : 330,
        y: isMobile ? 130 : 180,
        z: isMobile ? 1180 : 1380
      });
    }

    // =====================================================
    // USER INTERACTIONS
    // =====================================================

    function configureInteractions() {
      function beginInteraction() {
        userInteracting = true;
        autoTravelEnabled = false;
        focusedNode = null;

        lastInteractionTime =
          performance.now();
      }

      function continueInteraction() {
        if (!userInteracting) {
          return;
        }

        lastInteractionTime =
          performance.now();
      }

      function endInteraction() {
        userInteracting = false;

        lastInteractionTime =
          performance.now();
      }

      controls.addEventListener(
        "start",
        beginInteraction
      );

      controls.addEventListener(
        "change",
        continueInteraction
      );

      controls.addEventListener(
        "end",
        endInteraction
      );

      const graphElement =
        document.getElementById("graph");

      graphElement.addEventListener(
        "wheel",
        () => {
          autoTravelEnabled = false;
          focusedNode = null;

          lastInteractionTime =
            performance.now();
        },
        { passive: true }
      );

      graphElement.addEventListener(
        "touchstart",
        () => {
          autoTravelEnabled = false;
          focusedNode = null;

          lastInteractionTime =
            performance.now();
        },
        { passive: true }
      );
    }

    // =====================================================
    // GRAPH EVENTS
    // =====================================================

    function configureGraphEvents() {
      Graph.onNodeHover((node) => {
        hoveredNode = node || null;

        document.body.style.cursor =
          node ? "pointer" : "grab";

        updateVisibleLabels(true);
      });

      Graph.onNodeClick((node) => {
        if (!node) {
          return;
        }

        focusedNode = node;
        hoveredNode = node;

        autoTravelEnabled = false;

        lastInteractionTime =
          performance.now();

        const nodePosition =
          new THREE.Vector3(
            Number.isFinite(node.x)
              ? node.x
              : 0,

            Number.isFinite(node.y)
              ? node.y
              : 0,

            Number.isFinite(node.z)
              ? node.z
              : 0
          );

        const direction =
          camera.position
            .clone()
            .sub(nodePosition)
            .normalize();

        if (direction.lengthSq() === 0) {
          direction.set(0, 0, 1);
        }

        const focusDistance =
          isMobile ? 112 : 92;

        const destination =
          nodePosition
            .clone()
            .add(
              direction.multiplyScalar(
                focusDistance
              )
            );

        Graph.cameraPosition(
          {
            x: destination.x,
            y: destination.y,
            z: destination.z
          },
          {
            x: nodePosition.x,
            y: nodePosition.y,
            z: nodePosition.z
          },
          1700
        );

        updateVisibleLabels(true);
      });

      document
        .getElementById("refreshBtn")
        .addEventListener(
          "click",
          resetGalaxyView
        );
    }

    // =====================================================
    // INTRO SEQUENCE
    // =====================================================

    function startIntro() {
      const loading =
        document.getElementById("loading");

      setTimeout(() => {
        loading.classList.add("hidden");
      }, 500);

      setTimeout(() => {
        Graph.zoomToFit(
          1400,
          isMobile ? 155 : 195
        );
      }, 550);

      /*
        The camera enters somewhat closer than before.
      */
      setTimeout(() => {
        Graph.cameraPosition(
          {
            x: isMobile ? 315 : 410,
            y: isMobile ? 90 : 125,
            z: isMobile ? 650 : 740
          },
          {
            x: 0,
            y: 0,
            z: 0
          },
          prefersReducedMotion
            ? 600
            : 3200
        );
      }, 2200);

      setTimeout(() => {
        introCompleted = true;

        autoTravelEnabled =
          !prefersReducedMotion;

        lastInteractionTime =
          performance.now();

        updateVisibleLabels(true);
      }, prefersReducedMotion ? 3000 : 5700);
    }

    // =====================================================
    // RESET VIEW
    // =====================================================

    function resetGalaxyView() {
      hoveredNode = null;
      focusedNode = null;

      userInteracting = false;
      autoTravelEnabled = false;

      lastInteractionTime =
        performance.now();

      Graph.cameraPosition(
        {
          x: isMobile ? 330 : 425,
          y: isMobile ? 100 : 135,
          z: isMobile ? 670 : 760
        },
        {
          x: 0,
          y: 0,
          z: 0
        },
        1600
      );

      setTimeout(() => {
        updateVisibleLabels(true);
      }, 1650);
    }

    // =====================================================
    // FULL GALAXY CAMERA TRAVEL
    // =====================================================

    function updateCinematicTravel(deltaTime) {
      if (
        !introCompleted ||
        userInteracting ||
        focusedNode ||
        prefersReducedMotion
      ) {
        return;
      }

      const idleDuration =
        performance.now() -
        lastInteractionTime;

      if (
        idleDuration >
        AUTO_TRAVEL_IDLE_DELAY
      ) {
        autoTravelEnabled = true;
      }

      if (!autoTravelEnabled) {
        return;
      }

      travelTime +=
        deltaTime * AUTO_TRAVEL_SPEED;

      /*
        Inward and outward zoom.
      */
      const primaryZoom =
        Math.sin(travelTime * 0.82) *
        CAMERA_ZOOM_DISTANCE;

      const secondaryZoom =
        Math.sin(travelTime * 0.31) *
        (CAMERA_ZOOM_DISTANCE * 0.38);

      const radius =
        CAMERA_BASE_DISTANCE +
        primaryZoom +
        secondaryZoom;

      /*
        The camera does not simply orbit the centre.

        The camera target moves through different galaxy
        regions, creating travel across the full network.
      */
      const targetX =
        Math.sin(travelTime * 0.23) *
          (isMobile ? 250 : 370) +
        Math.sin(travelTime * 0.61) *
          (isMobile ? 65 : 95);

      const targetY =
        Math.cos(travelTime * 0.34) *
          (isMobile ? 100 : 155) +
        Math.sin(travelTime * 0.71) *
          (isMobile ? 45 : 70);

      const targetZ =
        Math.sin(travelTime * 0.19) *
          (isMobile ? 230 : 340) +
        Math.cos(travelTime * 0.53) *
          (isMobile ? 55 : 85);

      /*
        The camera position also follows an irregular
        three-dimensional path around and through the galaxy.
      */
      camera.position.x =
        targetX +
        Math.cos(travelTime) * radius;

      camera.position.z =
        targetZ +
        Math.sin(travelTime * 0.91) * radius;

      camera.position.y =
        targetY +
        Math.sin(travelTime * 0.47) *
          (isMobile ? 190 : 285) +
        Math.cos(travelTime * 0.17) *
          (isMobile ? 70 : 110);

      camera.lookAt(
        targetX,
        targetY,
        targetZ
      );
    }

    // =====================================================
    // GALAXY SWIRL
    // =====================================================

    function updateGalaxySwirl(
      deltaTime,
      elapsedTime
    ) {
      if (
        !Graph ||
        prefersReducedMotion
      ) {
        return;
      }

      const currentNodes =
        Graph.graphData().nodes;

      const frameFactor =
        Math.min(
          deltaTime / 16.667,
          1.5
        );

      const swirlStrength =
        0.000015 * frameFactor;

      const verticalStrength =
        0.0004 * frameFactor;

      for (
        let index = 0;
        index < currentNodes.length;
        index++
      ) {
        const node =
          currentNodes[index];

        if (
          !Number.isFinite(node.x) ||
          !Number.isFinite(node.y) ||
          !Number.isFinite(node.z)
        ) {
          continue;
        }

        node.vx =
          (node.vx || 0) -
          node.z * swirlStrength;

        node.vz =
          (node.vz || 0) +
          node.x * swirlStrength;

        node.vy =
          (node.vy || 0) +
          Math.sin(
            elapsedTime * 0.00031 +
            node.__phase
          ) *
          verticalStrength;
      }
    }

    // =====================================================
    // DISTANCE-BASED LABEL VISIBILITY
    // =====================================================

    function updateVisibleLabels(forceUpdate) {
      if (
        !Graph ||
        !camera ||
        !SHOW_LABELS
      ) {
        return;
      }

      if (
        !forceUpdate &&
        frameCounter %
          LABEL_UPDATE_INTERVAL !==
          0
      ) {
        return;
      }

      const currentNodes =
        Graph.graphData().nodes;

      const candidates = [];

      for (
        let index = 0;
        index < currentNodes.length;
        index++
      ) {
        const node =
          currentNodes[index];

        if (
          !node.__label ||
          !Number.isFinite(node.x) ||
          !Number.isFinite(node.y) ||
          !Number.isFinite(node.z)
        ) {
          continue;
        }

        const differenceX =
          node.x - camera.position.x;

        const differenceY =
          node.y - camera.position.y;

        const differenceZ =
          node.z - camera.position.z;

        const distanceSquared =
          differenceX * differenceX +
          differenceY * differenceY +
          differenceZ * differenceZ;

        const importanceBoost =
          node.importance === 3
            ? 0.47
            : node.importance === 2
              ? 0.68
              : 1;

        candidates.push({
          node,
          score:
            distanceSquared *
            importanceBoost
        });
      }

      candidates.sort(
        (first, second) =>
          first.score - second.score
      );

      const visibleNodes =
        new Set();

      const visibleCount =
        Math.min(
          MAX_VISIBLE_LABELS,
          candidates.length
        );

      for (
        let index = 0;
        index < visibleCount;
        index++
      ) {
        visibleNodes.add(
          candidates[index].node
        );
      }

      if (hoveredNode) {
        visibleNodes.add(hoveredNode);
      }

      if (focusedNode) {
        visibleNodes.add(focusedNode);
      }

      for (
        let index = 0;
        index < candidates.length;
        index++
      ) {
        const node =
          candidates[index].node;

        const shouldShow =
          visibleNodes.has(node);

        node.__label.visible =
          shouldShow;

        if (shouldShow) {
          node.__labelMaterial.opacity =
            node === hoveredNode ||
            node === focusedNode
              ? 1
              : node.importance === 3
                ? 0.94
                : 0.82;
        } else {
          node.__labelMaterial.opacity = 0;
        }
      }
    }

    // =====================================================
    // LIGHTWEIGHT STAR ANIMATION
    // =====================================================

    function updateNodeAnimation(elapsedTime) {
      if (!Graph) {
        return;
      }

      /*
        Updating every second frame helps maintain
        smooth performance with hundreds of stars.
      */
      if (frameCounter % 2 !== 0) {
        return;
      }

      const currentNodes =
        Graph.graphData().nodes;

      const time =
        elapsedTime * 0.001;

      for (
        let index = 0;
        index < currentNodes.length;
        index++
      ) {
        const node =
          currentNodes[index];

        if (!node.__star) {
          continue;
        }

        const breathing =
          1 +
          Math.sin(
            time * 0.92 +
            node.__phase
          ) *
          0.035;

        const size =
          node.__baseStarSize *
          breathing;

        node.__star.scale.set(
          size,
          size,
          1
        );
      }
    }

    // =====================================================
    // BACKGROUND ANIMATION
    // =====================================================

    function updateBackground(deltaTime) {
      if (prefersReducedMotion) {
        return;
      }

      const frameFactor =
        Math.min(
          deltaTime / 16.667,
          1.5
        );

      if (nearStars) {
        nearStars.rotation.y +=
          0.00001 * frameFactor;
      }

      if (farStars) {
        farStars.rotation.y -=
          0.000004 * frameFactor;
      }

      if (galaxyDust) {
        galaxyDust.rotation.z +=
          0.0000025 * frameFactor;
      }
    }

    // =====================================================
    // ANIMATION LOOP
    // =====================================================

    function startAnimationLoop() {
      function animate(currentTime) {
        animationFrameId =
          requestAnimationFrame(animate);

        if (!pageVisible) {
          previousFrameTime =
            currentTime;

          return;
        }

        const deltaTime =
          Math.min(
            currentTime -
              previousFrameTime,
            32
          );

        previousFrameTime =
          currentTime;

        frameCounter++;

        updateGalaxySwirl(
          deltaTime,
          currentTime
        );

        updateCinematicTravel(
          deltaTime
        );

        updateVisibleLabels(false);

        updateNodeAnimation(
          currentTime
        );

        updateBackground(
          deltaTime
        );
      }

      animationFrameId =
        requestAnimationFrame(animate);
    }

    // =====================================================
    // DEEP-SPACE BACKGROUND
    // =====================================================

    function createDeepSpace(scene) {
      createNearStars(scene);
      createFarStars(scene);
      createGalaxyDust(scene);
    }

    function createNearStars(scene) {
      const geometry =
        new THREE.BufferGeometry();

      const count =
        isMobile ? 800 : 1600;

      const positions =
        new Float32Array(count * 3);

      const colors =
        new Float32Array(count * 3);

      /*
        The background remains varied and subtle.
        These are separate from the orange skill stars.
      */
      const starColors = [
        new THREE.Color("#ffffff"),
        new THREE.Color("#a7d9ff"),
        new THREE.Color("#ffe1a1"),
        new THREE.Color("#c8b9ff")
      ];

      for (
        let index = 0;
        index < count;
        index++
      ) {
        const offset =
          index * 3;

        positions[offset] =
          (Math.random() - 0.5) *
          10000;

        positions[offset + 1] =
          (Math.random() - 0.5) *
          10000;

        positions[offset + 2] =
          (Math.random() - 0.5) *
          10000;

        const color =
          starColors[
            Math.floor(
              Math.random() *
                starColors.length
            )
          ];

        colors[offset] = color.r;
        colors[offset + 1] = color.g;
        colors[offset + 2] = color.b;
      }

      geometry.setAttribute(
        "position",
        new THREE.BufferAttribute(
          positions,
          3
        )
      );

      geometry.setAttribute(
        "color",
        new THREE.BufferAttribute(
          colors,
          3
        )
      );

      const material =
        new THREE.PointsMaterial({
          size: isMobile ? 1 : 1.2,
          sizeAttenuation: true,
          vertexColors: true,
          transparent: true,
          opacity: 0.68,
          depthWrite: false
        });

      nearStars =
        new THREE.Points(
          geometry,
          material
        );

      scene.add(nearStars);
    }

    function createFarStars(scene) {
      const geometry =
        new THREE.BufferGeometry();

      const count =
        isMobile ? 450 : 900;

      const positions =
        new Float32Array(count * 3);

      for (
        let index = 0;
        index < count;
        index++
      ) {
        const offset =
          index * 3;

        positions[offset] =
          (Math.random() - 0.5) *
          18000;

        positions[offset + 1] =
          (Math.random() - 0.5) *
          18000;

        positions[offset + 2] =
          (Math.random() - 0.5) *
          18000;
      }

      geometry.setAttribute(
        "position",
        new THREE.BufferAttribute(
          positions,
          3
        )
      );

      const material =
        new THREE.PointsMaterial({
          size: isMobile ? 0.65 : 0.82,
          sizeAttenuation: true,
          color: "#769ce4",
          transparent: true,
          opacity: 0.34,
          depthWrite: false
        });

      farStars =
        new THREE.Points(
          geometry,
          material
        );

      scene.add(farStars);
    }

    function createGalaxyDust(scene) {
      const geometry =
        new THREE.BufferGeometry();

      const count =
        isMobile ? 250 : 520;

      const positions =
        new Float32Array(count * 3);

      const colors =
        new Float32Array(count * 3);

      const purple =
        new THREE.Color("#6655aa");

      const blue =
        new THREE.Color("#34658e");

      for (
        let index = 0;
        index < count;
        index++
      ) {
        const offset =
          index * 3;

        const angle =
          Math.random() *
          Math.PI *
          2;

        const radius =
          500 +
          Math.pow(
            Math.random(),
            0.7
          ) *
            3800;

        positions[offset] =
          Math.cos(angle) *
          radius;

        positions[offset + 1] =
          (Math.random() - 0.5) *
          700;

        positions[offset + 2] =
          Math.sin(angle) *
          radius;

        const color =
          index % 2 === 0
            ? purple
            : blue;

        colors[offset] = color.r;
        colors[offset + 1] = color.g;
        colors[offset + 2] = color.b;
      }

      geometry.setAttribute(
        "position",
        new THREE.BufferAttribute(
          positions,
          3
        )
      );

      geometry.setAttribute(
        "color",
        new THREE.BufferAttribute(
          colors,
          3
        )
      );

      const material =
        new THREE.PointsMaterial({
          size: isMobile ? 1.1 : 1.4,
          sizeAttenuation: true,
          vertexColors: true,
          transparent: true,
          opacity: 0.08,
          depthWrite: false
        });

      galaxyDust =
        new THREE.Points(
          geometry,
          material
        );

      galaxyDust.rotation.x = -0.18;

      scene.add(galaxyDust);
    }

    // =====================================================
    // PAGE VISIBILITY PERFORMANCE
    // =====================================================

    document.addEventListener(
      "visibilitychange",
      () => {
        pageVisible =
          !document.hidden;

        previousFrameTime =
          performance.now();
      }
    );

    // =====================================================
    // RESPONSIVE RESIZE
    // =====================================================

    window.addEventListener(
      "resize",
      () => {
        clearTimeout(resizeTimer);

        resizeTimer = setTimeout(() => {
          if (!Graph) {
            return;
          }

          Graph.width(
            window.innerWidth
          );

          Graph.height(
            window.innerHeight
          );

          if (camera) {
            camera.aspect =
              window.innerWidth /
              window.innerHeight;

            camera.updateProjectionMatrix();
          }

          updateVisibleLabels(true);
        }, 150);
      }
    );

    // =====================================================
    // CLEANUP
    // =====================================================

    window.addEventListener(
      "beforeunload",
      () => {
        if (animationFrameId) {
          cancelAnimationFrame(
            animationFrameId
          );
        }
      }
    );
  </script>
</body>
</html>
