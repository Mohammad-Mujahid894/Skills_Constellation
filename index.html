      display: flex;
      align-items: center;
      justify-content: center;

    }

    #refreshBtn:hover { transform: scale(1.1); box-shadow: 0 6px 20px rgba(255, 255, 255, 0.5); }
    #refreshBtn:active { transform: scale(0.95); }

  width: 100%;

  overflow: hidden;
}
#3d-graph {

  "Maximizer Excellence Optimization", "Performance Enhancement", "Skill Refinement", "Process Optimization", "Quality Improvement",
  "Achiever Goal Completion", "Task Execution", "Performance Tracking", "Milestone Management", "Productivity Boosting",
  "Responsibility Ownership", "Accountability", "Follow-Through", "Dependability", "Trustworthiness",
  "Analytical Data Evaluation", "Logical Reasoning",

  "Consistency Fairness", "Rule-Based Management", "Equality Enforcement", "Policy Adherence", "Standardization",
  "Belief Values Alignment", "Ethical Decision Making", "Principle-Driven Action", "Mission Alignment", "Integrity Focus",
  "Communication Storytelling", "Persuasive Writing", "Presentation Skills", "Influential Communication",
  "Context Historical Insight", "Lessons From History", "Trend Analysis", "Comparative Analysis", "Situational Awareness",
  "Activator Initiative Taking", "Proactive Execution", "Action-Oriented Mindset", "Implementation Drive", "Quick Launching",
  "Command Decision Leadership", "Directive Leadership", "Influence Authority", "Conflict Handling", "Crisis Management",
  "Woo Relationship Initiating", "Social Influence", "Networking Skills", "Connection Building", "Relationship Initiation",
  "Includer Inclusion Facilitation", "Diversity Awareness", "Inclusive Team Building", "Equity Practices", "Participation Encouragement",
  "Strengths-Based Coaching", "Gallup Strengths Mapping", 
  "Dispute Resolution Management", "SLA Management", "Invoice Discrepancy Investigation", "Supplier Reconciliation", "Customer Credit Analysis",
  "Vendor Risk Assessment", "Power Automate", "Google App Script", "Power Apps", "Month-End Closing", "Statutory Compliance Reporting"
];
const N = skills.length;
const gData = {
  nodes: [...Array(N).keys()].map(i => ({ id: i, skill: skills[i % skills.length] })),
  links: [...Array(N).keys()].filter(i => i).map(i => ({ source: i, target: Math.round(Math.random() * (i - 1)) }))
};

// ========== GLOW STAR ==========
const canvas = document.getElementById('starCanvas');
const ctx = canvas.getContext('2d');
const cx = canvas.width/2, cy = canvas.height/2;
let burstProgress = 1;
let targetBurstProgress = 1;

function drawGlowingStar() {
    burstProgress += (targetBurstProgress - burstProgress) * 0.08;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let i=8;i>0;i--){
        ctx.save();
        const baseRadius = 50 + i*10;
        const glowRadius = baseRadius * burstProgress + Math.sin(Date.now()/900)*2;
        ctx.globalAlpha = 0.06*(i/8)*burstProgress;
        ctx.shadowBlur = (30+i*5)*burstProgress;
        ctx.beginPath();
        ctx.arc(cx,cy,glowRadius,0,Math.PI*2);
        ctx.closePath();
        ctx.fillStyle = i%2===0?'rgba(62,189,255,0.7)':'rgba(255,236,128,0.3)';
        ctx.shadowColor = i%2===0?'#60ecff':'#fffadc';
        ctx.fill();
        ctx.restore();
    }

    ctx.save();
    const grad = ctx.createRadialGradient(cx,cy,5,cx,cy,20*burstProgress);
    grad.addColorStop(0,'#fff');
    grad.addColorStop(0.3,'#fff6b5');
    grad.addColorStop(1,'#fffacd11');
    ctx.beginPath();
    ctx.arc(cx,cy,20*burstProgress,0,Math.PI*2);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.shadowColor='gold';
    ctx.shadowBlur = 30*burstProgress;
    ctx.fill();
    ctx.restore();

    requestAnimationFrame(drawGlowingStar);
}
drawGlowingStar();
const starTexture = new THREE.CanvasTexture(canvas);

// ========== 3D GRAPH ==========
const Graph = ForceGraph3D({ controlType:'orbit' })(document.getElementById('3d-graph'))
  .backgroundColor("rgba(0, 0, 0, 0)")
  .graphData(gData)
  .nodeThreeObject(node=>{
    const group = new THREE.Group();

    const starCanvas = document.createElement('canvas');
    starCanvas.width = starCanvas.height = 64;
    const ctx = starCanvas.getContext('2d');
    const gradient = ctx.createRadialGradient(32,32,0,32,32,32);
    gradient.addColorStop(0,'rgba(255,255,200,1)');
    gradient.addColorStop(0.3,'rgba(255,220,120,0.8)');
    gradient.addColorStop(0.6,'rgba(255,180,60,0.5)');
    gradient.addColorStop(1,'rgba(255,180,60,0)');
    ctx.fillStyle = gradient;
    ctx.fillRect(0,0,64,64);
    const texture = new THREE.CanvasTexture(starCanvas);
    const material = new THREE.SpriteMaterial({map:texture,transparent:true});
    const sprite = new THREE.Sprite(material);
    sprite.scale.set(STAR_SIZE, STAR_SIZE, 1);
    group.add(sprite);

    const labelCanvas = document.createElement('canvas');
    const labelCtx = labelCanvas.getContext('2d');
    labelCtx.font = `${LABEL_FONT_SIZE}px MyCustomFont`;
    const text = node.skill;
    const textWidth = labelCtx.measureText(text).width;
    labelCanvas.width = textWidth+20;
    labelCanvas.height = LABEL_FONT_SIZE+10;
    labelCtx.font = `${LABEL_FONT_SIZE}px MyCustomFont`;
    labelCtx.fillStyle = '#cce6ff';
    labelCtx.fillText(text,5,LABEL_FONT_SIZE);
    const labelTexture = new THREE.CanvasTexture(labelCanvas);
    const labelMaterial = new THREE.SpriteMaterial({map:labelTexture,transparent:true});
    const label = new THREE.Sprite(labelMaterial);
    label.position.set(0,LABEL_FONT_SIZE*0.2,0);
    label.scale.set(labelCanvas.width*0.06,labelCanvas.height*0.06,1);
    group.add(label);

    node.__label = label;
    node.__threeObj = group; // save reference for refresh
    return group;
  })
  .linkWidth(1)
  .linkColor(()=> 'rgba(160,200,220,0.08)')
  .linkOpacity(1)
  .linkDirectionalParticles(1)
  .linkDirectionalParticleWidth(PARTICLE_WIDTH)
  .linkDirectionalParticleSpeed(()=> PARTICLE_SPEED)
  .linkDirectionalParticleColor(()=> `rgba(255,246,200,${PARTICLE_OPACITY})`)
  .onNodeHover(node=>document.body.style.cursor=node?'pointer':null);

Graph.d3Force('link').distance(45);
Graph.d3Force('charge').strength(-25);

const initialZ = 900;
Graph.cameraPosition({ x:0, y:0, z:initialZ });

const controls = Graph.controls();
controls.enableDamping = true;
controls.dampingFactor = 0.005;
controls.zoomSpeed = 0.5;
controls.minDistance = 150;
controls.maxDistance = 2000;
controls.enableRotate = true;
controls.enablePan = true;
controls.screenSpacePanning = true;
  controls.enableZoom = true;  // make sure zoom works

let userInteracting = false;
let lastInteractionEndedAt = 0;
const DRIFT_RESUME_DELAY = 260;
const driftSpeed = 0.0018;
const targetDriftSpeed = 0.00135;
const cam = Graph.camera();

let camTarget = new THREE.Vector3();
let lookTarget = controls.target.clone();
let lookDestination = controls.target.clone();
let visibilityFrame = 0;

// One uninterrupted cinematic zoom from the original opening distance.
let openingActive = true;
const OPENING_DURATION = 5600;
const openingStartedAt = performance.now();
const openingStartPosition = cam.position.clone();
const openingLookTarget = controls.target.clone();
const openingEndDistance = 455;

const openingDirection = openingStartPosition.clone().sub(openingLookTarget).normalize();
const openingWorldUp = new THREE.Vector3(0, 1, 0);
let openingSide = new THREE.Vector3().crossVectors(openingDirection, openingWorldUp);
if (openingSide.lengthSq() < 0.0001) openingSide.set(1, 0, 0);
else openingSide.normalize();

// A very gentle arc makes the continuous zoom feel cinematic, not mechanical.
const openingEndDirection = openingDirection.clone()
  .applyAxisAngle(openingWorldUp, 0.20)
  .applyAxisAngle(openingSide, -0.07)
  .normalize();
const openingEndPosition = openingLookTarget.clone().add(
  openingEndDirection.multiplyScalar(openingEndDistance)
);

const projectedNodePosition = new THREE.Vector3();
const worldNodePosition = new THREE.Vector3();
const cameraForward = new THREE.Vector3();
const cameraToNode = new THREE.Vector3();

function randomSigned(min, max) {
  const value = min + Math.random() * (max - min);
  return Math.random() < 0.5 ? -value : value;
}

function cinematicEase(t) {
  const x = THREE.MathUtils.clamp(t, 0, 1);
  return x < 0.5
    ? 4 * x * x * x
    : 1 - Math.pow(-2 * x + 2, 3) / 2;
}

function updateOpeningJourney(now) {
  if (!openingActive || userInteracting) return;

  const progress = THREE.MathUtils.clamp(
    (now - openingStartedAt) / OPENING_DURATION,
    0,
    1
  );
  const eased = cinematicEase(progress);

  // A single continuous interpolation: no stops, steps or simulated wheel clicks.
  cam.position.lerpVectors(openingStartPosition, openingEndPosition, eased);
  cam.lookAt(openingLookTarget);

  if (progress >= 1) {
    openingActive = false;
    lookTarget.copy(controls.target);
    lookDestination.copy(controls.target);
    pickImmersiveTargetFromCurrentView();
  }
}

// Creates an immersive destination from the user's latest camera and zoom.
function pickImmersiveTargetFromCurrentView() {
  const currentLook = controls.target.clone();
  const radial = cam.position.clone().sub(currentLook);
  let currentDistance = radial.length();

  if (!Number.isFinite(currentDistance) || currentDistance < 1) {
    radial.set(0, 0, 1);
    currentDistance = 700;
  }

  const direction = radial.normalize();
  const worldUp = new THREE.Vector3(0, 1, 0);
  let side = new THREE.Vector3().crossVectors(direction, worldUp);
  if (side.lengthSq() < 0.0001) side.set(1, 0, 0);
  else side.normalize();

  const localUp = new THREE.Vector3().crossVectors(side, direction).normalize();
  direction.applyAxisAngle(localUp, randomSigned(0.38, 1.05));
  direction.applyAxisAngle(side, randomSigned(0.18, 0.62));
  direction.normalize();

  let distanceMultiplier;
  const travelMode = Math.random();
  if (travelMode < 0.42) distanceMultiplier = 0.58 + Math.random() * 0.22;
  else if (travelMode < 0.78) distanceMultiplier = 1.22 + Math.random() * 0.38;
  else distanceMultiplier = 0.92 + Math.random() * 0.16;

  const nextDistance = THREE.MathUtils.clamp(
    currentDistance * distanceMultiplier,
    controls.minDistance + 35,
    Math.min(controls.maxDistance, 1650)
  );

  const focusRange = Math.min(170, Math.max(70, currentDistance * 0.16));
  lookDestination.copy(currentLook).add(new THREE.Vector3(
    (Math.random() - 0.5) * focusRange,
    (Math.random() - 0.5) * focusRange,
    (Math.random() - 0.5) * focusRange * 0.7
  ));

  camTarget.copy(lookDestination).add(direction.multiplyScalar(nextDistance));
}

controls.addEventListener('start', () => {
  userInteracting = true;
  openingActive = false;
  camTarget.copy(cam.position);
  lookTarget.copy(controls.target);
  lookDestination.copy(controls.target);
});

controls.addEventListener('change', () => {
  if (!userInteracting) return;
  camTarget.copy(cam.position);
  lookTarget.copy(controls.target);
  lookDestination.copy(controls.target);
});

controls.addEventListener('end', () => {
  userInteracting = false;
  lastInteractionEndedAt = performance.now();
  lookTarget.copy(controls.target);
  pickImmersiveTargetFromCurrentView();
});

// Only labels in the current forward view are candidates.
// Within that view, only the nearest 65% appear; deeper labels stay hidden
// and automatically appear as the camera enters their region.
function updateFrontLabelVisibility() {
  const nodes = Graph.graphData().nodes;
  const visibleCandidates = [];

  cam.getWorldDirection(cameraForward);

  for (const node of nodes) {
    if (!node.__label || !Number.isFinite(node.x) || !Number.isFinite(node.y) || !Number.isFinite(node.z)) continue;

    worldNodePosition.set(node.x, node.y, node.z);
    cameraToNode.copy(worldNodePosition).sub(cam.position);
    const forwardDepth = cameraToNode.dot(cameraForward);

    if (forwardDepth <= 0) {
      node.__label.visible = false;
      continue;
    }

    projectedNodePosition.copy(worldNodePosition).project(cam);
    const onScreen =
      projectedNodePosition.z >= -1 && projectedNodePosition.z <= 1 &&
      Math.abs(projectedNodePosition.x) <= 1.02 &&
      Math.abs(projectedNodePosition.y) <= 1.02;

    if (!onScreen) {
      node.__label.visible = false;
      continue;
    }

    visibleCandidates.push({ node, depth: forwardDepth });
  }

  if (!visibleCandidates.length) return;

  visibleCandidates.sort((a, b) => a.depth - b.depth);
  const visibleCount = Math.max(1, Math.ceil(visibleCandidates.length * 0.65));

  for (let i = 0; i < visibleCandidates.length; i += 1) {
    const label = visibleCandidates[i].node.__label;
    label.visible = i < visibleCount;

    if (label.visible && label.material) {
      // Soft edge at the depth boundary, while the deep background stays fully hidden.
      const rank = visibleCount <= 1 ? 0 : i / (visibleCount - 1);
      label.material.opacity = rank > 0.82
        ? THREE.MathUtils.lerp(1, 0.42, (rank - 0.82) / 0.18)
        : 1;
    }
  }
}

function autoDrift(now) {
  if (openingActive) {
    updateOpeningJourney(now);
    return;
  }

  if (userInteracting) return;
  if (now - lastInteractionEndedAt < DRIFT_RESUME_DELAY) return;

  cam.position.lerp(camTarget, driftSpeed);
  lookTarget.lerp(lookDestination, targetDriftSpeed);
  controls.target.copy(lookTarget);
  cam.lookAt(lookTarget);

  const cameraArrived = cam.position.distanceTo(camTarget) < 26;
  const focusArrived = lookTarget.distanceTo(lookDestination) < 8;
  if (cameraArrived && focusArrived) pickImmersiveTargetFromCurrentView();
}

(function animateLoop(now) {
  requestAnimationFrame(animateLoop);
  autoDrift(now);

  visibilityFrame += 1;
  if (visibilityFrame % 6 === 0) updateFrontLabelVisibility();
})(performance.now());

</script>
