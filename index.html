<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <title>Mohammad Mujahid's 3-D Skills Constellation Chart</title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <style>
    @font-face {
      font-family: "FoundationTitlesHand";
      src: url("./FoundationTitlesHand.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
      font-display: block;
    }

    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background:
        radial-gradient(
          circle at 50% 48%,
          #0b0b2d 0%,
          #07071e 30%,
          #040414 60%,
          #010108 100%
        );
    }

    body {
      position: relative;
      font-family: Arial, sans-serif;
    }

    #3d-graph {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      cursor: grab;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    #3d-graph:active {
      cursor: grabbing;
    }

    #spaceVignette {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      background:
        radial-gradient(
          circle at center,
          rgba(13, 18, 60, 0) 40%,
          rgba(3, 3, 18, 0.16) 72%,
          rgba(0, 0, 8, 0.48) 100%
        );
    }

    #introFlash {
      position: fixed;
      inset: 0;
      z-index: 15;
      pointer-events: none;
      opacity: 1;
      transform-origin: center;
      background:
        radial-gradient(
          circle at center,
          rgba(255, 255, 255, 0.96) 0%,
          rgba(215, 238, 255, 0.55) 2%,
          rgba(130, 188, 255, 0.24) 8%,
          rgba(64, 95, 210, 0.10) 19%,
          rgba(0, 0, 0, 0) 48%
        );
      animation: bigBangFlash 3.2s ease-out forwards;
    }

    @keyframes bigBangFlash {
      0% {
        opacity: 1;
        transform: scale(0.04);
      }

      25% {
        opacity: 0.86;
        transform: scale(0.5);
      }

      58% {
        opacity: 0.34;
        transform: scale(1.35);
      }

      100% {
        opacity: 0;
        transform: scale(2.8);
      }
    }

    #hint {
      position: fixed;
      left: 18px;
      bottom: 18px;
      z-index: 20;
      color: rgba(222, 238, 255, 0.68);
      font-family: Arial, sans-serif;
      font-size: 12px;
      line-height: 1.4;
      letter-spacing: 0.25px;
      user-select: none;
      pointer-events: none;
      text-shadow: 0 0 12px rgba(100, 165, 255, 0.55);
      transition: opacity 0.8s ease;
    }

    #resetBtn {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 20;

      width: 52px;
      height: 52px;
      padding: 0;

      display: flex;
      align-items: center;
      justify-content: center;

      border: 1px solid rgba(190, 220, 255, 0.14);
      border-radius: 50%;

      color: #ffffff;
      background: rgba(255, 255, 255, 0.09);

      backdrop-filter: blur(9px);
      -webkit-backdrop-filter: blur(9px);

      font-size: 24px;
      line-height: 1;
      cursor: pointer;

      box-shadow:
        0 4px 18px rgba(115, 165, 255, 0.28),
        inset 0 0 12px rgba(255, 255, 255, 0.05);

      transition:
        transform 0.2s ease,
        background 0.2s ease,
        box-shadow 0.2s ease;
    }

    #resetBtn:hover {
      transform: scale(1.08);
      background: rgba(255, 255, 255, 0.15);
      box-shadow:
        0 6px 24px rgba(155, 195, 255, 0.48),
        inset 0 0 14px rgba(255, 255, 255, 0.08);
    }

    #resetBtn:active {
      transform: scale(0.95);
    }

    @media (max-width: 768px) {
      #hint {
        left: 12px;
        bottom: 13px;
        max-width: calc(100vw - 90px);
        font-size: 10px;
      }

      #resetBtn {
        right: 15px;
        bottom: 15px;
        width: 48px;
        height: 48px;
        font-size: 22px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      #introFlash {
        display: none;
      }
    }
  </style>
</head>

    /*
      Important:

      Inside JavaScript strings, use normal ampersands:

      "Charts & Graphs"

      Do not write:

      "Charts &amp; Graphs"
    */

    // =====================================================
    // GRAPH DATA
    // =====================================================

    const graphNodes = skills.map((skill, index) => {
      /*
        All nodes begin close to the centre.

        The force simulation pushes the constellation outward,
        creating the opening Big Bang expansion.
      */
      const initialRadius = 2 + Math.random() * 5;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);

      return {
        id: index,
        skill: skill,

        x:
          initialRadius *
          Math.sin(phi) *
          Math.cos(theta),

        y:
          initialRadius *
          Math.sin(phi) *
          Math.sin(theta),

        z:
          initialRadius *
          Math.cos(phi),

        phase: Math.random() * Math.PI * 2
      };
    });

    const graphLinks = graphNodes
      .filter(node => node.id > 0)
      .map(node => {
        return {
          source: node.id,
          target: Math.floor(Math.random() * node.id)
        };
      });

    const graphData = {
      nodes: graphNodes,
      links: graphLinks
    };

    // =====================================================
    // GLOBAL OBJECTS
    // =====================================================

    let Graph = null;
    let camera = null;
    let controls = null;

    let nearStarfield = null;
    let farStarfield = null;
    let galaxyDust = null;
    let constellationRoot = null;

    let userInteracting = false;
    let lastInteractionTime = Date.now();

    let introStartTime = performance.now();
    let pageVisible = true;

    // =====================================================
    // FONT LOADING
    // =====================================================

    async function loadFoundationFont() {
      if (!document.fonts) {
        return;
      }

      try {
        await document.fonts.load(
          `${LABEL_FONT_SIZE}px "FoundationTitlesHand"`
        );

        await document.fonts.ready;
      } catch (error) {
        console.warn(
          "FoundationTitlesHand.ttf could not be loaded.",
          error
        );
      }
    }

    loadFoundationFont().then(initializeGalaxy);

    // =====================================================
    // CREATE GALAXY
    // =====================================================

    function initializeGalaxy() {
      Graph = ForceGraph3D({
        controlType: "orbit"
      })(document.getElementById("3d-graph"));

      Graph
        .width(window.innerWidth)
        .height(window.innerHeight)
        .showNavInfo(false)
        .backgroundColor("rgba(0,0,0,0)")
        .graphData(graphData)

        /*
          The simulation runs continuously so the custom
          oscillation stays active.

          The force levels are intentionally very low.
        */
        .cooldownTime(Infinity)
        .d3AlphaDecay(0.025)
        .d3VelocityDecay(0.34);

      const renderer = Graph.renderer();

      renderer.setPixelRatio(
        Math.min(
          window.devicePixelRatio || 1,
          isMobile ? 1.3 : 1.8
        )
      );

      if ("outputColorSpace" in renderer) {
        renderer.outputColorSpace = THREE.SRGBColorSpace;
      }

      const scene = Graph.scene();

      scene.fog = new THREE.FogExp2(
        0x040414,
        isMobile ? 0.00036 : 0.00032
      );

      scene.add(
        new THREE.AmbientLight(0xffffff, 0.75)
      );

      createDeepSpaceBackground(scene);
      configureNodeAppearance();
      configureConstellationLinks();
      configureForces();
      configureCamera();
      configureInteractions();
      configureResetButton();

      /*
        Find the graph's internal Three.js root.

        This root is used only for an extremely subtle rotation.
        Node positions and user controls remain unaffected.
      */
      constellationRoot = Graph.scene().children.find(
        object =>
          object.type === "Group" &&
          object !== nearStarfield &&
          object !== farStarfield &&
          object !== galaxyDust
      ) || null;

      introStartTime = performance.now();

      Graph.d3ReheatSimulation();

      requestAnimationFrame(animationLoop);

      setTimeout(() => {
        const hint = document.getElementById("hint");

        if (hint) {
          hint.style.opacity = "0.42";
        }
      }, 9000);
    }

    // =====================================================
    // STAR AND LABEL APPEARANCE
    // =====================================================

    function configureNodeAppearance() {
      const starTextureCache = new Map();

      const starPalettes = [
        {
          core: "rgba(255,255,230,1)",
          middle: "rgba(255,222,115,0.77)",
          glow: "rgba(255,180,60,0.16)",
          outer: "rgba(255,170,40,0)"
        },
        {
          core: "rgba(238,252,255,1)",
          middle: "rgba(110,215,255,0.70)",
          glow: "rgba(65,155,255,0.15)",
          outer: "rgba(50,140,255,0)"
        },
        {
          core: "rgba(255,246,255,1)",
          middle: "rgba(206,165,255,0.66)",
          glow: "rgba(150,95,255,0.14)",
          outer: "rgba(140,85,255,0)"
        },
        {
          core: "rgba(246,255,242,1)",
          middle: "rgba(168,246,203,0.64)",
          glow: "rgba(70,220,153,0.13)",
          outer: "rgba(60,205,140,0)"
        }
      ];

      function createStarTexture(paletteIndex) {
        if (starTextureCache.has(paletteIndex)) {
          return starTextureCache.get(paletteIndex);
        }

        const palette = starPalettes[paletteIndex];

        const canvas =
          document.createElement("canvas");

        canvas.width = 96;
        canvas.height = 96;

        const context =
          canvas.getContext("2d");

        const gradient =
          context.createRadialGradient(
            48,
            48,
            0,
            48,
            48,
            48
          );

        gradient.addColorStop(0, palette.core);
        gradient.addColorStop(0.13, palette.core);
        gradient.addColorStop(0.34, palette.middle);
        gradient.addColorStop(0.58, palette.glow);
        gradient.addColorStop(1, palette.outer);

        context.fillStyle = gradient;
        context.fillRect(0, 0, 96, 96);

        const texture =
          new THREE.CanvasTexture(canvas);

        if ("colorSpace" in texture) {
          texture.colorSpace =
            THREE.SRGBColorSpace;
        }

        texture.needsUpdate = true;

        starTextureCache.set(
          paletteIndex,
          texture
        );

        return texture;
      }

      function createLabelTexture(text) {
        const canvas =
          document.createElement("canvas");

        const context =
          canvas.getContext("2d");

        const fontDefinition =
          `${LABEL_FONT_SIZE}px "FoundationTitlesHand"`;

        context.font = fontDefinition;

        const measuredWidth =
          Math.ceil(
            context.measureText(text).width
          );

        canvas.width = Math.min(
          Math.max(measuredWidth + 52, 120),
          2048
        );

        canvas.height =
          LABEL_FONT_SIZE + 38;

        /*
          Canvas settings reset after changing its dimensions,
          so the custom TTF font is applied again.
        */
        context.font = fontDefinition;
        context.textAlign = "left";
        context.textBaseline = "middle";

        context.shadowColor =
          "rgba(85,155,255,0.62)";

        context.shadowBlur =
          isMobile ? 6 : 8;

        context.fillStyle =
          "rgba(229,243,255,0.98)";

        context.fillText(
          text,
          26,
          canvas.height / 2
        );

        const texture =
          new THREE.CanvasTexture(canvas);

        if ("colorSpace" in texture) {
          texture.colorSpace =
            THREE.SRGBColorSpace;
        }

        texture.minFilter =
          THREE.LinearFilter;

        texture.magFilter =
          THREE.LinearFilter;

        texture.needsUpdate = true;

        return {
          texture: texture,
          width: canvas.width,
          height: canvas.height
        };
      }

      Graph.nodeThreeObject(node => {
        const group =
          new THREE.Group();

        const paletteIndex =
          node.id % starPalettes.length;

        const starMaterial =
          new THREE.SpriteMaterial({
            map: createStarTexture(paletteIndex),
            transparent: true,
            opacity: 0,
            depthWrite: false,
            blending: THREE.AdditiveBlending
          });

        const starSprite =
          new THREE.Sprite(starMaterial);

        const majorStar =
          node.id % 19 === 0;

        const mediumStar =
          !majorStar &&
          node.id % 8 === 0;

        const importanceScale =
          majorStar
            ? 1.45
            : mediumStar
              ? 1.17
              : 1;

        starSprite.scale.set(
          STAR_SIZE * importanceScale,
          STAR_SIZE * importanceScale,
          1
        );

        group.add(starSprite);

        // ---------------------------------------------
        // SKILL LABEL
        // ---------------------------------------------

        const labelData =
          createLabelTexture(node.skill);

        const labelMaterial =
          new THREE.SpriteMaterial({
            map: labelData.texture,
            transparent: true,
            opacity: 0,
            depthWrite: false
          });

        const labelSprite =
          new THREE.Sprite(labelMaterial);

        /*
          Position is close enough to visually connect the
          skill name to its star.
        */
        labelSprite.position.set(
          0,
          isMobile ? 7.2 : 8.2,
          0
        );

        labelSprite.scale.set(
          labelData.width * LABEL_WORLD_SCALE,
          labelData.height * LABEL_WORLD_SCALE,
          1
        );

        group.add(labelSprite);

        /*
          Start nearly invisible for the Big Bang reveal.
        */
        group.scale.set(
          0.001,
          0.001,
          0.001
        );

        node.__threeObj = group;
        node.__starSprite = starSprite;
        node.__starMaterial = starMaterial;
        node.__labelSprite = labelSprite;
        node.__labelMaterial = labelMaterial;
        node.__importanceScale = importanceScale;

        return group;
      });

      Graph.nodeThreeObjectExtend(false);
    }

    // =====================================================
    // CONSTELLATION LINKS
    // =====================================================

    function configureConstellationLinks() {
      Graph
        .linkWidth(isMobile ? 0.58 : 0.78)
        .linkColor(
          () => "rgba(124,166,238,0.14)"
        )
        .linkOpacity(1)
        .linkDirectionalParticles(
          isMobile ? 1 : 2
        )
        .linkDirectionalParticleWidth(
          PARTICLE_WIDTH
        )
        .linkDirectionalParticleSpeed(
          () => PARTICLE_SPEED
        )
        .linkDirectionalParticleColor(
          () =>
            `rgba(255,246,207,${PARTICLE_OPACITY})`
        );
    }

    // =====================================================
    // FORCE SIMULATION
    // =====================================================

    function configureForces() {
      const linkForce =
        Graph.d3Force("link");

      const chargeForce =
        Graph.d3Force("charge");

      if (linkForce) {
        /*
          More compact than the previous version.
        */
        linkForce.distance(
          isMobile ? 34 : 39
        );
      }

      if (chargeForce) {
        chargeForce.strength(
          isMobile ? -15 : -21
        );

        if (
          typeof chargeForce.distanceMax ===
          "function"
        ) {
          chargeForce.distanceMax(
            isMobile ? 300 : 370
          );
        }
      }

      // ---------------------------------------------
      // INSIDE-OUT OSCILLATION
      // ---------------------------------------------

      let oscillatingNodes = [];

      function constellationOscillation(alpha) {
        const time =
          performance.now() * 0.00038;

        const baseStrength =
          isMobile ? 0.007 : 0.0095;

        const activeAlpha =
          Math.max(alpha, 0.08);

        for (
          let index = 0;
          index < oscillatingNodes.length;
          index++
        ) {
          const node =
            oscillatingNodes[index];

          const x = node.x || 0;
          const y = node.y || 0;
          const z = node.z || 0;

          const distance =
            Math.hypot(x, y, z) || 1;

          const wave =
            Math.sin(
              time +
              node.phase +
              distance * 0.009
            );

          const force =
            wave *
            baseStrength *
            activeAlpha;

          node.vx +=
            (x / distance) * force;

          node.vy +=
            (y / distance) * force;

          node.vz +=
            (z / distance) * force;

          /*
            Very soft galactic swirl.
          */
          const swirlStrength =
            isMobile
              ? 0.000006
              : 0.000009;

          node.vx +=
            -z *
            swirlStrength *
            activeAlpha;

          node.vz +=
            x *
            swirlStrength *
            activeAlpha;
        }
      }

      constellationOscillation.initialize =
        function(nodes) {
          oscillatingNodes = nodes;
        };

      Graph.d3Force(
        "constellationOscillation",
        constellationOscillation
      );
    }

    // =====================================================
    // CAMERA AND CONTROLS
    // =====================================================

    function configureCamera() {
      Graph.cameraPosition({
        x: 0,
        y: isMobile ? 10 : 15,
        z: INITIAL_CAMERA_Z
      });

      camera = Graph.camera();
      controls = Graph.controls();

      controls.enableDamping = true;
      controls.dampingFactor = 0.055;

      controls.enableRotate = true;
      controls.enableZoom = true;
      controls.enablePan = true;

      controls.rotateSpeed =
        isMobile ? 0.46 : 0.56;

      controls.zoomSpeed =
        isMobile ? 0.82 : 0.96;

      controls.panSpeed =
        isMobile ? 0.54 : 0.64;

      controls.minDistance = 60;
      controls.maxDistance = 2200;

      controls.screenSpacePanning = true;

      /*
        OrbitControls auto-rotation preserves the exact camera
        distance chosen by the user.

        It does not snap back to a fixed radius.
      */
      controls.autoRotate = false;
      controls.autoRotateSpeed = 0.14;

      controls.target.set(0, 0, 0);
      controls.update();
    }

    // =====================================================
    // USER INTERACTION
    // =====================================================

    function beginUserInteraction() {
      userInteracting = true;
      lastInteractionTime = Date.now();

      if (controls) {
        controls.autoRotate = false;
      }
    }

    function endUserInteraction() {
      userInteracting = false;
      lastInteractionTime = Date.now();
    }

    function configureInteractions() {
      controls.addEventListener(
        "start",
        beginUserInteraction
      );

      controls.addEventListener(
        "end",
        endUserInteraction
      );

      const graphElement =
        document.getElementById("3d-graph");

      graphElement.addEventListener(
        "wheel",
        () => {
          lastInteractionTime =
            Date.now();

          controls.autoRotate = false;
        },
        {
          passive: true
        }
      );

      graphElement.addEventListener(
        "touchstart",
        beginUserInteraction,
        {
          passive: true
        }
      );

      graphElement.addEventListener(
        "pointerdown",
        beginUserInteraction,
        {
          passive: true
        }
      );

      Graph.onNodeHover(node => {
        document.body.style.cursor =
          node ? "pointer" : "grab";

        const nodes =
          Graph.graphData().nodes;

        for (
          let index = 0;
          index < nodes.length;
          index++
        ) {
          const graphNode =
            nodes[index];

          if (
            graphNode.__labelMaterial
          ) {
            graphNode.__labelMaterial.opacity =
              isMobile ? 0.88 : 0.94;
          }
        }

        if (
          node &&
          node.__labelMaterial
        ) {
          node.__labelMaterial.opacity = 1;
        }
      });

      Graph.onNodeClick(node => {
        if (!node) {
          return;
        }

        beginUserInteraction();

        const x =
          Number.isFinite(node.x)
            ? node.x
            : 1;

        const y =
          Number.isFinite(node.y)
            ? node.y
            : 1;

        const z =
          Number.isFinite(node.z)
            ? node.z
            : 1;

        const nodeDistance =
          Math.hypot(x, y, z) || 1;

        const focusDistance =
          isMobile ? 130 : 110;

        const distanceRatio =
          1 +
          focusDistance /
          nodeDistance;

        Graph.cameraPosition(
          {
            x: x * distanceRatio,
            y: y * distanceRatio,
            z: z * distanceRatio
          },
          {
            x: x,
            y: y,
            z: z
          },
          prefersReducedMotion
            ? 0
            : 1600
        );

        setTimeout(
          endUserInteraction,
          prefersReducedMotion
            ? 50
            : 1700
        );
      });
    }

    // =====================================================
    // RESET VIEW
    // =====================================================

    function configureResetButton() {
      const resetButton =
        document.getElementById("resetBtn");

      resetButton.addEventListener(
        "click",
        () => {
          beginUserInteraction();

          controls.target.set(0, 0, 0);

          Graph.cameraPosition(
            {
              x: 0,
              y: isMobile ? 10 : 15,
              z: RESET_CAMERA_Z
            },
            {
              x: 0,
              y: 0,
              z: 0
            },
            prefersReducedMotion
              ? 0
              : 1250
          );

          setTimeout(
            endUserInteraction,
            prefersReducedMotion
              ? 50
              : 1350
          );
        }
      );
    }

    // =====================================================
    // BIG BANG AND STAR ANIMATION
    // =====================================================

    function clamp(
      value,
      minimum,
      maximum
    ) {
      return Math.min(
        Math.max(value, minimum),
        maximum
      );
    }

    function easeOutExpo(value) {
      if (value >= 1) {
        return 1;
      }

      return 1 - Math.pow(
        2,
        -10 * value
      );
    }

    function animateConstellation(
      currentTime
    ) {
      const elapsed =
        currentTime -
        introStartTime;

      const time =
        currentTime * 0.001;

      const nodes =
        Graph.graphData().nodes;

      for (
        let index = 0;
        index < nodes.length;
        index++
      ) {
        const node = nodes[index];

        if (!node.__threeObj) {
          continue;
        }

        /*
          Staggered reveal makes the Big Bang travel across
          the constellation instead of appearing at once.
        */
        const nodeDelay =
          (node.id % 90) * 6;

        const rawProgress =
          (elapsed - nodeDelay) /
          BIG_BANG_DURATION;

        const introProgress =
          easeOutExpo(
            clamp(
              rawProgress,
              0,
              1
            )
          );

        /*
          Two independent frequencies prevent the entire
          network from pulsing as one rigid object.
        */
        const primaryPulse =
          Math.sin(
            time * 0.72 +
            node.phase
          ) * 0.018;

        const secondaryPulse =
          Math.sin(
            time * 0.27 +
            node.id * 0.13
          ) * 0.009;

        const visibleScale =
          Math.max(
            0.001,
            introProgress *
            (
              1 +
              primaryPulse +
              secondaryPulse
            )
          );

        node.__threeObj.scale.set(
          visibleScale,
          visibleScale,
          visibleScale
        );

        if (node.__starMaterial) {
          node.__starMaterial.opacity =
            introProgress *
            (
              0.80 +
              Math.sin(
                time * 0.90 +
                node.phase
              ) * 0.07
            );
        }

        if (node.__labelMaterial) {
          node.__labelMaterial.opacity =
            introProgress *
            (
              isMobile
                ? 0.88
                : 0.94
            );
        }
      }
    }

    // =====================================================
    // DEEP-SPACE BACKGROUND
    // =====================================================

    function createDeepSpaceBackground(
      scene
    ) {
      const nearGeometry =
        new THREE.BufferGeometry();

      const nearPositions = [];
      const nearColors = [];

      const availableColors = [
        new THREE.Color("#ffffff"),
        new THREE.Color("#91cbff"),
        new THREE.Color("#fff1a3"),
        new THREE.Color("#c9a8ff")
      ];

      for (
        let index = 0;
        index < NEAR_STAR_COUNT;
        index++
      ) {
        const radius =
          1200 +
          Math.random() * 5600;

        const theta =
          Math.random() *
          Math.PI *
          2;

        const phi =
          Math.acos(
            2 *
            Math.random() -
            1
          );

        nearPositions.push(
          radius *
          Math.sin(phi) *
          Math.cos(theta),

          radius *
          Math.sin(phi) *
          Math.sin(theta),

          radius *
          Math.cos(phi)
        );

        const color =
          availableColors[
            index %
            availableColors.length
          ];

        nearColors.push(
          color.r,
          color.g,
          color.b
        );
      }

      nearGeometry.setAttribute(
        "position",
        new THREE.Float32BufferAttribute(
          nearPositions,
          3
        )
      );

      nearGeometry.setAttribute(
        "color",
        new THREE.Float32BufferAttribute(
          nearColors,
          3
        )
      );

      const nearMaterial =
        new THREE.PointsMaterial({
          size: isMobile
            ? 0.95
            : 1.15,

          vertexColors: true,
          transparent: true,
          opacity: 0.74,
          depthWrite: false,
          sizeAttenuation: true
        });

      nearStarfield =
        new THREE.Points(
          nearGeometry,
          nearMaterial
        );

      scene.add(nearStarfield);

      // ---------------------------------------------
      // FAR STARFIELD
      // ---------------------------------------------

      const farGeometry =
        new THREE.BufferGeometry();

      const farPositions = [];

      for (
        let index = 0;
        index < FAR_STAR_COUNT;
        index++
      ) {
        const radius =
          5500 +
          Math.random() * 8000;

        const theta =
          Math.random() *
          Math.PI *
          2;

        const phi =
          Math.acos(
            2 *
            Math.random() -
            1
          );

        farPositions.push(
          radius *
          Math.sin(phi) *
          Math.cos(theta),

          radius *
          Math.sin(phi) *
          Math.sin(theta),

          radius *
          Math.cos(phi)
        );
      }

      farGeometry.setAttribute(
        "position",
        new THREE.Float32BufferAttribute(
          farPositions,
          3
        )
      );

      const farMaterial =
        new THREE.PointsMaterial({
          size: isMobile
            ? 0.55
            : 0.70,

          color: "#7898d8",
          transparent: true,
          opacity: 0.36,
          depthWrite: false,
          sizeAttenuation: true
        });

      farStarfield =
        new THREE.Points(
          farGeometry,
          farMaterial
        );

      scene.add(farStarfield);

      // ---------------------------------------------
      // CENTRAL GALACTIC DUST
      // ---------------------------------------------

      const dustGeometry =
        new THREE.BufferGeometry();

      const dustPositions = [];
      const dustColors = [];

      const blueDust =
        new THREE.Color("#5274ce");

      const violetDust =
        new THREE.Color("#855fc7");

      for (
        let index = 0;
        index < DUST_PARTICLE_COUNT;
        index++
      ) {
        const armAngle =
          Math.random() *
          Math.PI *
          8;

        const distance =
          60 +
          Math.random() *
          1400;

        const spread =
          (Math.random() - 0.5) *
          (
            70 +
            distance * 0.10
          );

        dustPositions.push(
          Math.cos(armAngle) *
          distance +
          spread,

          (Math.random() - 0.5) *
          300,

          Math.sin(armAngle) *
          distance +
          spread
        );

        const color =
          index % 2 === 0
            ? blueDust
            : violetDust;

        dustColors.push(
          color.r,
          color.g,
          color.b
        );
      }

      dustGeometry.setAttribute(
        "position",
        new THREE.Float32BufferAttribute(
          dustPositions,
          3
        )
      );

      dustGeometry.setAttribute(
        "color",
        new THREE.Float32BufferAttribute(
          dustColors,
          3
        )
      );

      const dustMaterial =
        new THREE.PointsMaterial({
          size: isMobile
            ? 1.15
            : 1.45,

          vertexColors: true,
          transparent: true,
          opacity: 0.14,
          depthWrite: false,
          blending:
            THREE.AdditiveBlending
        });

      galaxyDust =
        new THREE.Points(
          dustGeometry,
          dustMaterial
        );

      scene.add(galaxyDust);
    }

    // =====================================================
    // BACKGROUND MOVEMENT
    // =====================================================

    function animateDeepSpace() {
      if (prefersReducedMotion) {
        return;
      }

      if (nearStarfield) {
        nearStarfield.rotation.y +=
          0.000022;

        nearStarfield.rotation.x +=
          0.000004;
      }

      if (farStarfield) {
        farStarfield.rotation.y -=
          0.000009;

        farStarfield.rotation.z +=
          0.000003;
      }

      if (galaxyDust) {
        galaxyDust.rotation.y +=
          0.000045;

        galaxyDust.rotation.z +=
          0.000005;
      }
    }

    // =====================================================
    // USER-FRIENDLY IDLE ROTATION
    // =====================================================

    function updateIdleRotation() {
      if (!controls) {
        return;
      }

      const idleDuration =
        Date.now() -
        lastInteractionTime;

      controls.autoRotate =
        !prefersReducedMotion &&
        !userInteracting &&
        idleDuration >
          AUTO_ROTATE_IDLE_DELAY;
    }

    // =====================================================
    // MAIN LOOP
    // =====================================================

    function animationLoop(currentTime) {
      requestAnimationFrame(
        animationLoop
      );

      if (
        !pageVisible ||
        !Graph
      ) {
        return;
      }

      animateConstellation(currentTime);
      animateDeepSpace();
      updateIdleRotation();
    }

    // =====================================================
    // PAGE VISIBILITY
    // =====================================================

    document.addEventListener(
      "visibilitychange",
      () => {
        pageVisible =
          !document.hidden;

        if (pageVisible) {
          lastInteractionTime =
            Date.now();
        }
      }
    );

    // =====================================================
    // RESPONSIVE RESIZE
    // =====================================================

    let resizeTimer = null;

    window.addEventListener(
      "resize",
      () => {
        clearTimeout(
          resizeTimer
        );

        resizeTimer =
          setTimeout(() => {
            if (!Graph) {
              return;
            }

            Graph
              .width(
                window.innerWidth
              )
              .height(
                window.innerHeight
              );
          }, 100);
      }
    );
  </script>
</body>
