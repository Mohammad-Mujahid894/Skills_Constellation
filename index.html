<!doctype html>
<html lang="en">

      font-weight: normal;
      font-style: normal;
      font-display: block;
    }

    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background:
        radial-gradient(
          circle at 50% 48%,
          #0b0b2d 0%,
          #07071e 28%,
          #040414 58%,
          #010108 100%
        );
    }

    body {
      position: relative;
      font-family: Arial, sans-serif;
    }

    #3d-graph {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      cursor: grab;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    #3d-graph:active {
      cursor: grabbing;
    }

    #spaceVignette {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      background:
        radial-gradient(
          circle at center,
          rgba(15, 18, 58, 0) 42%,
          rgba(2, 2, 15, 0.18) 70%,
          rgba(0, 0, 8, 0.48) 100%
        );
    }

    #introFlash {
      position: fixed;
      inset: 0;
      z-index: 15;
      pointer-events: none;
      opacity: 1;
      background:
        radial-gradient(
          circle at center,
          rgba(255, 255, 255, 0.94) 0%,
          rgba(205, 232, 255, 0.44) 3%,
          rgba(118, 174, 255, 0.20) 11%,
          rgba(34, 64, 160, 0.07) 28%,
          rgba(0, 0, 0, 0) 55%
        );
      animation: introFlashAnimation 3.1s ease-out forwards;
    }

    @keyframes introFlashAnimation {
      0% {
        opacity: 1;
        transform: scale(0.08);
      }

      32% {
        opacity: 0.8;
        transform: scale(1.2);
      }

      100% {
        opacity: 0;
        transform: scale(2.5);
      }
    }

    #hint {
      position: fixed;
      left: 18px;
      bottom: 18px;
      z-index: 20;
      color: rgba(222, 238, 255, 0.65);
      font-family: Arial, sans-serif;
      font-size: 12px;
      line-height: 1.45;
      letter-spacing: 0.3px;
      user-select: none;
      pointer-events: none;
      text-shadow: 0 0 12px rgba(100, 165, 255, 0.55);
      transition: opacity 0.8s ease;
    }

    #resetBtn {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 20;

      width: 52px;
      height: 52px;

      display: flex;
      align-items: center;
      justify-content: center;

      padding: 0;
      border: 1px solid rgba(190, 220, 255, 0.12);
      border-radius: 50%;

      color: #ffffff;
      background: rgba(255, 255, 255, 0.09);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);

      font-size: 24px;
      line-height: 1;
      cursor: pointer;

      box-shadow:
        0 4px 18px rgba(115, 165, 255, 0.28),
        inset 0 0 12px rgba(255, 255, 255, 0.04);

      transition:
        transform 0.2s ease,
        background 0.2s ease,
        box-shadow 0.2s ease;
    }

    #resetBtn:hover {
      transform: scale(1.08);
      background: rgba(255, 255, 255, 0.15);
      box-shadow:
        0 6px 24px rgba(155, 195, 255, 0.48),
        inset 0 0 14px rgba(255, 255, 255, 0.08);
    }

    #resetBtn:active {
      transform: scale(0.95);
    }

    @media (max-width: 768px) {
      #hint {
        left: 12px;
        bottom: 13px;
        max-width: calc(100vw - 90px);
        font-size: 10px;
      }

      #resetBtn {
        right: 15px;
        bottom: 15px;
        width: 48px;
        height: 48px;
        font-size: 22px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      #introFlash {
        display: none;
      }
    }
  </style>
</head>

    // =====================================================

    function configureNodes() {
      const starTextureCache = new Map();

      const starPalettes = [
        {
          core: "rgba(255,255,228,1)",
          middle: "rgba(255,223,118,0.78)",
          glow: "rgba(255,184,66,0.17)",
          outer: "rgba(255,170,40,0)"
        },
        {
          core: "rgba(238,251,255,1)",
          middle: "rgba(116,214,255,0.72)",
          glow: "rgba(76,153,255,0.16)",
          outer: "rgba(70,145,255,0)"
        },
        {
          core: "rgba(255,246,255,1)",
          middle: "rgba(207,166,255,0.68)",
          glow: "rgba(153,100,255,0.14)",
          outer: "rgba(145,90,255,0)"
        },
        {
          core: "rgba(246,255,242,1)",
          middle: "rgba(170,247,203,0.66)",
          glow: "rgba(74,222,156,0.14)",
          outer: "rgba(65,207,144,0)"
        }
      ];

      function createStarTexture(paletteIndex) {
        if (starTextureCache.has(paletteIndex)) {
          return starTextureCache.get(paletteIndex);
        }

        const palette = starPalettes[paletteIndex];

        const canvas = document.createElement("canvas");

        canvas.width = 96;
        canvas.height = 96;

        const context = canvas.getContext("2d");

        const gradient = context.createRadialGradient(
          48,
          48,
          0,
          48,
          48,
          48
        );

        gradient.addColorStop(0, palette.core);
        gradient.addColorStop(0.14, palette.core);
        gradient.addColorStop(0.34, palette.middle);
        gradient.addColorStop(0.60, palette.glow);
        gradient.addColorStop(1, palette.outer);

        context.fillStyle = gradient;
        context.fillRect(0, 0, 96, 96);

        const texture = new THREE.CanvasTexture(canvas);

        texture.colorSpace = THREE.SRGBColorSpace;
        texture.needsUpdate = true;

        starTextureCache.set(paletteIndex, texture);

        return texture;
      }

      function createLabelTexture(text) {
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");

        const fontDefinition =
          `${LABEL_FONT_SIZE}px "FoundationTitlesHand"`;

        context.font = fontDefinition;

        const measuredWidth = Math.ceil(
          context.measureText(text).width
        );

        canvas.width = Math.min(
          Math.max(measuredWidth + 52, 120),
          2048
        );

        canvas.height = LABEL_FONT_SIZE + 38;

        /*
          Canvas state resets after changing the canvas dimensions.
          The FoundationTitlesHand font must therefore be applied again.
        */
        context.font = fontDefinition;
        context.textAlign = "left";
        context.textBaseline = "middle";

        /*
          The glow is intentionally controlled so the words remain
          clearer and stronger than the nearby star glow.
        */
        context.shadowColor = "rgba(92,163,255,0.70)";
        context.shadowBlur = isMobile ? 7 : 9;

        context.fillStyle = "rgba(226,241,255,0.98)";

        context.fillText(
          text,
          26,
          canvas.height / 2
        );

        const texture = new THREE.CanvasTexture(canvas);

        texture.colorSpace = THREE.SRGBColorSpace;
        texture.minFilter = THREE.LinearFilter;
        texture.magFilter = THREE.LinearFilter;
        texture.needsUpdate = true;

        return {
          texture: texture,
          width: canvas.width,
          height: canvas.height
        };
      }

      Graph.nodeThreeObject(node => {
        const group = new THREE.Group();

        const paletteIndex =

        const starMaterial =

            : mediumStar

          STAR_SIZE * importanceScale,
          STAR_SIZE * importanceScale,

        );

        group.add(starSprite);

        const labelData =

        const labelMaterial =

            map: labelData.texture,
            transparent: true,
            opacity: 0,
            depthWrite: false
          });

        const labelSprite =
          new THREE.Sprite(labelMaterial);

        /*
          The label sits above the smaller star, ensuring that
          the star glow does not cover the skill name.

          0
        );

        labelSprite.scale.set(

        );

        group.add(labelSprite);

        node.__threeObj = group;
        node.__starSprite = starSprite;
        node.__starMaterial = starMaterial;
        node.__labelSprite = labelSprite;
        node.__labelMaterial = labelMaterial;
        node.__importanceScale = importanceScale;

        return group;
      });

      Graph.nodeThreeObjectExtend(false);

    function configureLinks() {

    // =====================================================
    // FORCE SIMULATION AND INTERNAL OSCILLATION
    // =====================================================

    function configureForces() {
      const linkForce = Graph.d3Force("link");
      const chargeForce = Graph.d3Force("charge");

      if (linkForce) {
        linkForce.distance(
          isMobile ? 45 : 53
        );
      }

      if (chargeForce) {
        chargeForce.strength(
          isMobile ? -25 : -36
        );

        if (typeof chargeForce.distanceMax === "function") {
          chargeForce.distanceMax(
            isMobile ? 340 : 430
          );
        }
      }

      /*
        A lightweight custom force produces continuous, subtle,
        inside-out movement.

        The force does not create random aggressive movement.
        Each star receives a different phase, so the network appears
        to breathe naturally instead of moving as one rigid object.
      */
      let oscillatingNodes = [];

      function deepSpaceOscillation(alpha) {
        const time = performance.now() * 0.00042;

        const baseStrength =
          isMobile ? 0.010 : 0.014;

        for (let index = 0; index < oscillatingNodes.length; index++) {
          const node = oscillatingNodes[index];

          const distance =
            Math.hypot(
              node.x || 0,
              node.y || 0,
              node.z || 0
            ) || 1;

          const wave =
            Math.sin(
              time +
              node.phase +
              distance * 0.006
            );

          const strength =
            wave *
            baseStrength *
            Math.max(alpha, 0.18);

          node.vx +=
            ((node.x || 0) / distance) *
            strength;

          node.vy +=
            ((node.y || 0) / distance) *
            strength;

          node.vz +=
            ((node.z || 0) / distance) *
            strength;
        }
      }

      deepSpaceOscillation.initialize = function(nodesToUse) {
        oscillatingNodes = nodesToUse;
      };

      Graph.d3Force(
        "deepSpaceOscillation",
        deepSpaceOscillation
      );

      /*
        A secondary swirl creates a gentle galactic curve rather
        than simple straight expansion and contraction.
      */
      let swirlingNodes = [];

      function galaxySwirl(alpha) {
        const strength =
          (isMobile ? 0.00035 : 0.00048) *
          Math.max(alpha, 0.15);

        for (let index = 0; index < swirlingNodes.length; index++) {
          const node = swirlingNodes[index];

          const originalX = node.x || 0;
          const originalZ = node.z || 0;

          node.vx += -originalZ * strength;
          node.vz += originalX * strength;
        }
      }

      galaxySwirl.initialize = function(nodesToUse) {
        swirlingNodes = nodesToUse;
      };

      Graph.d3Force(
        "galaxySwirl",
        galaxySwirl
      );
    }

    // =====================================================

    function configureCamera() {
      Graph.cameraPosition({
        x: 0,
        y: 0,
        z: INITIAL_CAMERA_DISTANCE
      });

      camera = Graph.camera();
      controls = Graph.controls();

      controls.enableDamping = true;
      controls.dampingFactor = 0.065;

      controls.enableRotate = true;
      controls.enableZoom = true;
      controls.enablePan = true;

      controls.rotateSpeed = isMobile ? 0.48 : 0.58;
      controls.zoomSpeed = isMobile ? 0.88 : 1.02;
      controls.panSpeed = isMobile ? 0.58 : 0.68;

      controls.minDistance = 75;
      controls.maxDistance = 3600;

      controls.screenSpacePanning = true;

      /*
        OrbitControls handles idle rotation more naturally than
        manually replacing the camera position every frame.

        This preserves the exact location chosen by the user.
      */
      controls.autoRotate = false;
      controls.autoRotateSpeed = 0.12;

      controls.target.set(0, 0, 0);
      controls.update();
    }

    // =====================================================
    // USER INTERACTION
    // =====================================================

    function registerUserInteraction() {
      userInteracting = true;
      lastInteractionTime = Date.now();

      if (controls) {
        controls.autoRotate = false;
      }
    }

    function endUserInteraction() {
      userInteracting = false;
      lastInteractionTime = Date.now();
    }

    function configureInteractions() {
      controls.addEventListener(
        "start",
        registerUserInteraction
      );

      controls.addEventListener(
        "end",
        endUserInteraction
      );

      Graph.onNodeHover(node => {
        document.body.style.cursor =
          node ? "pointer" : "grab";

        Graph.graphData().nodes.forEach(graphNode => {
          if (graphNode.__labelMaterial) {
            graphNode.__labelMaterial.opacity =
              isMobile ? 0.88 : 0.93;
          }
        });

        if (node && node.__labelMaterial) {
          node.__labelMaterial.opacity = 1;
        }
      });

      Graph.onNodeClick(node => {
        if (!node) {
          return;
        }

        registerUserInteraction();

        const x = Number.isFinite(node.x)
          ? node.x
          : 1;

        const y = Number.isFinite(node.y)
          ? node.y
          : 1;

        const z = Number.isFinite(node.z)
          ? node.z
          : 1;

        const nodeDistance =
          Math.hypot(x, y, z) || 1;

        const focusDistance =
          isMobile ? 165 : 140;

        const distanceRatio =
          1 + focusDistance / nodeDistance;

        Graph.cameraPosition(
          {
            x: x * distanceRatio,
            y: y * distanceRatio,
            z: z * distanceRatio
          },
          {
            x: x,
            y: y,
            z: z
          },
          prefersReducedMotion ? 0 : 1900
        );

        setTimeout(() => {
          endUserInteraction();
        }, prefersReducedMotion ? 50 : 2000);
      });

      const graphElement =
        document.getElementById("3d-graph");

      graphElement.addEventListener(
        "wheel",
        registerUserInteraction,
        {
          passive: true
        }
      );

      graphElement.addEventListener(
        "touchstart",
        registerUserInteraction,
        {
          passive: true
        }
      );

      graphElement.addEventListener(
        "pointerdown",
        registerUserInteraction,
        {
          passive: true
        }
      );
    }

    // =====================================================

      const resetButton =
        document.getElementById("resetBtn");

      resetButton.addEventListener("click", () => {
        registerUserInteraction();

        controls.target.set(0, 0, 0);

        Graph.cameraPosition(
          {
            x: 0,
            y: 35,
            z: NORMAL_CAMERA_DISTANCE
          },
          {
            x: 0,
            y: 0,
            z: 0
          },
          prefersReducedMotion ? 0 : 1500
        );

        setTimeout(() => {
          Graph.zoomToFit(
            prefersReducedMotion ? 0 : 1200,
            isMobile ? 95 : 125
          );

          endUserInteraction();
        }, prefersReducedMotion ? 50 : 800);
      });
    }

    // =====================================================

    // =====================================================

    function clamp(value, minimum, maximum) {
      return Math.min(
        Math.max(value, minimum),
        maximum
      );
    }

    function easeOutExpo(value) {
      if (value >= 1) {
        return 1;
      }

      return 1 - Math.pow(2, -10 * value);
    }

    function animateSkillStars(currentTime) {
      const elapsed =
        currentTime - introStartTime;

      const time =
        currentTime * 0.001;

      const graphNodes =
        Graph.graphData().nodes;

      for (
        let index = 0;
        index < graphNodes.length;
        index++
      ) {
        const node = graphNodes[index];

        if (!node.__threeObj) {
          continue;
        }

        /*
          Small per-node delays make the opening look like a wave
          expanding from a central event.
        */
        const nodeDelay =
          (node.id % 85) * 7;

        const rawIntroProgress =
          (elapsed - nodeDelay) /
          BIG_BANG_DURATION;

        const introProgress =
          easeOutExpo(
            clamp(rawIntroProgress, 0, 1)
          );

        const softPulse =
          1 +
          Math.sin(
            time * 1.15 +
            node.phase
          ) * 0.024;

        const secondaryPulse =
          1 +
          Math.sin(
            time * 0.38 +
            node.id * 0.23
          ) * 0.012;

        const visibleScale =
          Math.max(
            0.001,
            introProgress *
            softPulse *
            secondaryPulse
          );

        node.__threeObj.scale.set(
          visibleScale,
          visibleScale,
          visibleScale
        );

        if (node.__starMaterial) {
          node.__starMaterial.opacity =
            introProgress *
            (
              0.78 +
              Math.sin(
                time * 1.2 +
                node.phase
              ) * 0.08
            );
        }

        if (node.__labelMaterial) {
          node.__labelMaterial.opacity =
            introProgress *
            (
              isMobile
                ? 0.88
                : 0.94
            );
        }
      }
    }

    // =====================================================
    // DEEP-SPACE BACKGROUND
    // =====================================================

    function createDeepSpaceBackground(scene) {
      const nearGeometry =
        new THREE.BufferGeometry();

      const nearPositions = [];
      const nearColors = [];

      const white =
        new THREE.Color("#ffffff");

      const blue =
        new THREE.Color("#91cbff");

      const gold =
        new THREE.Color("#fff1a3");

      const violet =
        new THREE.Color("#c9a8ff");

      const availableColors = [
        white,
        blue,
        gold,
        violet
      ];

      for (
        let index = 0;
        index < BACKGROUND_STAR_COUNT;
        index++
      ) {
        const radius =
          1400 +
          Math.random() * 6200;

        const theta =
          Math.random() * Math.PI * 2;

        const phi =
          Math.acos(
            2 * Math.random() - 1
          );

        nearPositions.push(
          radius *
            Math.sin(phi) *
            Math.cos(theta),

          radius *
            Math.sin(phi) *
            Math.sin(theta),

          radius *
            Math.cos(phi)
        );

        const color =
          availableColors[
            index %
            availableColors.length
          ];

        nearColors.push(
          color.r,
          color.g,
          color.b
        );
      }

      nearGeometry.setAttribute(
        "position",
        new THREE.Float32BufferAttribute(
          nearPositions,
          3
        )
      );

      nearGeometry.setAttribute(
        "color",
        new THREE.Float32BufferAttribute(
          nearColors,
          3
        )
      );

      const nearMaterial =
        new THREE.PointsMaterial({
          size: isMobile ? 1.05 : 1.28,
          vertexColors: true,
          transparent: true,
          opacity: 0.78,
          depthWrite: false,
          sizeAttenuation: true
        });

      galaxyStars =
        new THREE.Points(
          nearGeometry,
          nearMaterial
        );

      scene.add(galaxyStars);

      // -----------------------------------------------------

      const farGeometry =
        new THREE.BufferGeometry();

      const farPositions = [];

      for (
        let index = 0;
        index < FAR_STAR_COUNT;
        index++
      ) {
        const radius =
          6000 +
          Math.random() * 8500;

        const theta =
          Math.random() * Math.PI * 2;

        const phi =
          Math.acos(
            2 * Math.random() - 1
          );

        farPositions.push(
          radius *
            Math.sin(phi) *
            Math.cos(theta),

          radius *
            Math.sin(phi) *
            Math.sin(theta),

          radius *
            Math.cos(phi)
        );
      }

      farGeometry.setAttribute(
        "position",
        new THREE.Float32BufferAttribute(
          farPositions,
          3
        )
      );

      const farMaterial =
        new THREE.PointsMaterial({
          size: isMobile ? 0.62 : 0.78,
          color: "#7c9ddf",
          transparent: true,
          opacity: 0.38,
          depthWrite: false,
          sizeAttenuation: true
        });

      farGalaxyStars =
        new THREE.Points(
          farGeometry,
          farMaterial
        );

      scene.add(farGalaxyStars);

      // -----------------------------------------------------
      // CENTRAL GALACTIC DUST
      // -----------------------------------------------------

      const dustGeometry =
        new THREE.BufferGeometry();

      const dustPositions = [];
      const dustColors = [];

      const dustCount =
        isMobile ? 500 : 1100;

      const dustyBlue =
        new THREE.Color("#547bd8");

      const dustyViolet =
        new THREE.Color("#8c6fd2");

      for (
        let index = 0;
        index < dustCount;
        index++
      ) {
        const armAngle =
          Math.random() * Math.PI * 8;

        const distance =
          80 + Math.random() * 1700;

        const spread =
          (Math.random() - 0.5) *
          (80 + distance * 0.12);

        dustPositions.push(
          Math.cos(armAngle) *
            distance +
            spread,

          (Math.random() - 0.5) *
            360,

          Math.sin(armAngle) *
            distance +
            spread
        );

        const color =
          index % 2 === 0
            ? dustyBlue
            : dustyViolet;

        dustColors.push(
          color.r,
          color.g,
          color.b
        );
      }

      dustGeometry.setAttribute(
        "position",
        new THREE.Float32BufferAttribute(
          dustPositions,
          3
        )
      );

      dustGeometry.setAttribute(
        "color",
        new THREE.Float32BufferAttribute(
          dustColors,
          3
        )
      );

      const dustMaterial =
        new THREE.PointsMaterial({
          size: isMobile ? 1.35 : 1.65,
          vertexColors: true,
          transparent: true,
          opacity: 0.16,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        });

      galaxyDust =
        new THREE.Points(
          dustGeometry,
          dustMaterial
        );

      scene.add(galaxyDust);
    }

    // =====================================================
    // BACKGROUND MOTION
    // =====================================================

    function animateDeepSpace() {
      if (galaxyStars) {
        galaxyStars.rotation.y +=
          prefersReducedMotion
            ? 0
            : 0.000025;

        galaxyStars.rotation.x +=
          prefersReducedMotion
            ? 0
            : 0.000005;
      }

      if (farGalaxyStars) {
        farGalaxyStars.rotation.y -=
          prefersReducedMotion
            ? 0
            : 0.000011;

        farGalaxyStars.rotation.z +=
          prefersReducedMotion
            ? 0
            : 0.000004;
      }

      if (galaxyDust) {
        galaxyDust.rotation.y +=
          prefersReducedMotion
            ? 0
            : 0.000055;

        galaxyDust.rotation.z +=
          prefersReducedMotion
            ? 0
            : 0.000006;
      }
    }

    // =====================================================
    // AUTO MOVEMENT
    // =====================================================

    function updateIdleMovement() {
      if (!controls) {
        return;
      }

      const idleDuration =
        Date.now() - lastInteractionTime;

      /*
        OrbitControls auto-rotation keeps the user's chosen
        camera distance and position instead of snapping the
        camera back to a predetermined radius.
      */
      controls.autoRotate =
        !prefersReducedMotion &&
        !userInteracting &&
        idleDuration > AUTO_MOVE_IDLE_DELAY;
    }

    // =====================================================
    // KEEP SUBTLE FORCE MOTION ACTIVE
    // =====================================================

    function maintainInternalOscillation(currentTime) {
      if (
        prefersReducedMotion ||
        !Graph ||
        currentTime - lastOscillationUpdate < 2200
      ) {
        return;
      }

      lastOscillationUpdate = currentTime;

      /*
        Reheating only at a low interval is less aggressive than
        continuously resetting the force simulation each frame.
      */
      Graph.d3ReheatSimulation();
    }

    // =====================================================
    // MAIN ANIMATION LOOP
    // =====================================================

    function animationLoop(currentTime) {
      requestAnimationFrame(animationLoop);

      if (
        !pageVisible ||
        !Graph
      ) {
        return;
      }

      animateSkillStars(currentTime);
      animateDeepSpace();
      updateIdleMovement();
      maintainInternalOscillation(currentTime);
    }

    // =====================================================
    // VISIBILITY AND RESIZE
    // =====================================================

    document.addEventListener(
      "visibilitychange",
      () => {
        pageVisible = !document.hidden;

        if (pageVisible) {
          lastInteractionTime =
            Date.now();
        }
      }
    );

    let resizeTimer = null;

    window.addEventListener(
      "resize",
      () => {
        clearTimeout(resizeTimer);

        resizeTimer = setTimeout(() => {
          if (!Graph) {
            return;
          }

          Graph
            .width(window.innerWidth)
            .height(window.innerHeight);
        }, 100);
      }
    );
  </script>
</body>
