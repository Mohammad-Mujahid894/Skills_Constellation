<!doctype html>
<html lang="en">
<head>

  <meta

  <style>
    @font-face {
      font-family: "MyCustomFont";
      src: url("FoundationTitlesHand.ttf") format("truetype");
      font-display: swap;
    }

    :root {
      --space-base: #040414;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background-color: var(--space-base);
    }

    body {
      position: relative;

      /*
        Lightweight space/galaxy background.
        No additional stars, canvases, images, or animations are used.
      */
      background:
        radial-gradient(
          ellipse at 16% 18%,
          rgba(56, 92, 180, 0.13) 0%,
          rgba(35, 50, 120, 0.055) 26%,
          transparent 52%
        ),
        radial-gradient(
          ellipse at 84% 28%,
          rgba(125, 62, 180, 0.105) 0%,
          rgba(78, 37, 125, 0.045) 28%,
          transparent 55%
        ),
        radial-gradient(
          ellipse at 55% 88%,
          rgba(23, 124, 155, 0.085) 0%,
          rgba(17, 75, 100, 0.035) 28%,
          transparent 54%
        ),
        radial-gradient(
          ellipse at 48% 46%,
          rgba(24, 37, 84, 0.08) 0%,
          transparent 62%
        ),
        linear-gradient(
          145deg,
          #02020d 0%,
          #040414 42%,
          #050318 72%,
          #02020c 100%
        );
    }

    #3d-graph {
      position: fixed;
      inset: 0;
      z-index: 1;

      width: 100%;
      height: 100%;

      display: block;

      /*
        Required for OrbitControls gestures on touch devices.
      */
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    #3d-graph canvas {
      display: block;
      outline: none;
    }

    #starCanvas {
      display: none;
      width: 256px;
      height: 256px;
    }

    #refreshBtn {
      position: fixed;
      right: max(20px, env(safe-area-inset-right));
      bottom: max(20px, env(safe-area-inset-bottom));
      z-index: 10;

      width: 50px;
      height: 50px;
      padding: 0;

      display: flex;
      align-items: center;
      justify-content: center;

      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 50%;

      background: rgba(255, 255, 255, 0.1);
      -webkit-backdrop-filter: blur(5px);
      backdrop-filter: blur(5px);

      color: #ffffff;
      font-family: Arial, sans-serif;
      font-size: 24px;
      line-height: 1;

      cursor: pointer;

      box-shadow:
        0 4px 15px rgba(255, 255, 255, 0.22),
        inset 0 0 12px rgba(255, 255, 255, 0.04);

      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease,
        background-color 0.2s ease;
    }

    #refreshBtn:hover {
      transform: scale(1.1);

      background: rgba(255, 255, 255, 0.14);

      box-shadow:
        0 6px 20px rgba(255, 255, 255, 0.38),
        inset 0 0 14px rgba(255, 255, 255, 0.06);
    }

    #refreshBtn:active {
      transform: scale(0.95);
    }

    #refreshBtn:focus-visible {
      outline: 2px solid rgba(160, 220, 255, 0.9);
      outline-offset: 4px;
    }

    @media (max-width: 600px) {
      #refreshBtn {
        right: max(14px, env(safe-area-inset-right));
        bottom: max(14px, env(safe-area-inset-bottom));

        width: 46px;
        height: 46px;

        font-size: 22px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      #refreshBtn {
        transition: none;
      }
    }
  </style>
</head>

    "use strict";

    // =========================================================

    const PARTICLE_WIDTH = 1.0;
    const PARTICLE_SPEED = 0.001;

  "Consistency Fairness", "Rule-Based Management", "Equality Enforcement", "Policy Adherence", "Standardization",
  "Belief Values Alignment", "Ethical Decision Making", "Principle-Driven Action", "Mission Alignment", "Integrity Focus",
  "Communication Storytelling", "Persuasive Writing", "Presentation Skills", "Influential Communication",
  "Context Historical Insight", "Lessons From History", "Trend Analysis", "Comparative Analysis", "Situational Awareness",
  "Activator Initiative Taking", "Proactive Execution", "Action-Oriented Mindset", "Implementation Drive", "Quick Launching",
  "Command Decision Leadership", "Directive Leadership", "Influence Authority", "Conflict Handling", "Crisis Management",
  "Woo Relationship Initiating", "Social Influence", "Networking Skills", "Connection Building", "Relationship Initiation",
  "Includer Inclusion Facilitation", "Diversity Awareness", "Inclusive Team Building", "Equity Practices", "Participation Encouragement",
  "Strengths-Based Coaching", "Gallup Strengths Mapping", 
  "Dispute Resolution Management", "SLA Management", "Invoice Discrepancy Investigation", "Supplier Reconciliation", "Customer Credit Analysis",
  "Vendor Risk Assessment", "Power Automate", "Google App Script", "Power Apps", "Month-End Closing", "Statutory Compliance Reporting"
    ];

    // =========================================================
    // GRAPH DATA
    // =========================================================

    const N = skills.length;

    const gData = {
      nodes: [...Array(N).keys()].map((i) => ({
        id: i,
        skill: skills[i % skills.length]
      })),

      links: [...Array(N).keys()]
        .filter((i) => i)
        .map((i) => ({
          source: i,
          target: Math.round(Math.random() * (i - 1))
        }))
    };

    // =========================================================
    // ORIGINAL GLOWING STAR TEXTURE
    // =========================================================

    const glowCanvas = document.getElementById("starCanvas");
    const glowContext = glowCanvas.getContext("2d", {
      alpha: true
    });

    const glowCenterX = glowCanvas.width / 2;
    const glowCenterY = glowCanvas.height / 2;

    let burstProgress = 1;
    let targetBurstProgress = 1;

    function drawGlowingStar() {
      burstProgress +=
        (targetBurstProgress - burstProgress) * 0.08;

      glowContext.clearRect(
        0,
        0,
        glowCanvas.width,
        glowCanvas.height
      );

      for (let i = 8; i > 0; i -= 1) {
        glowContext.save();

        const baseRadius = 50 + i * 10;

        const glowRadius =
          baseRadius * burstProgress +
          Math.sin(Date.now() / 900) * 2;

        glowContext.globalAlpha =
          0.06 * (i / 8) * burstProgress;

        glowContext.shadowBlur =
          (30 + i * 5) * burstProgress;

        glowContext.beginPath();

        glowContext.arc(
          glowCenterX,
          glowCenterY,
          glowRadius,
          0,
          Math.PI * 2
        );

        glowContext.closePath();

        glowContext.fillStyle =
          i % 2 === 0
            ? "rgba(62, 189, 255, 0.7)"
            : "rgba(255, 236, 128, 0.3)";

        glowContext.shadowColor =
          i % 2 === 0
            ? "#60ecff"
            : "#fffadc";

        glowContext.fill();
        glowContext.restore();
      }

      glowContext.save();

      const glowGradient =
        glowContext.createRadialGradient(
          glowCenterX,
          glowCenterY,
          5,
          glowCenterX,
          glowCenterY,
          20 * burstProgress
        );

      glowGradient.addColorStop(0, "#ffffff");
      glowGradient.addColorStop(0.3, "#fff6b5");
      glowGradient.addColorStop(1, "#fffacd11");

      glowContext.beginPath();

      glowContext.arc(
        glowCenterX,
        glowCenterY,
        20 * burstProgress,
        0,
        Math.PI * 2
      );

      glowContext.closePath();

      glowContext.fillStyle = glowGradient;
      glowContext.shadowColor = "gold";
      glowContext.shadowBlur = 30 * burstProgress;

      glowContext.fill();
      glowContext.restore();

      requestAnimationFrame(drawGlowingStar);
    }

    drawGlowingStar();

    // Kept from the original implementation.
    const starTexture = new THREE.CanvasTexture(glowCanvas);

    // =========================================================
    // REUSABLE NODE STAR TEXTURE
    // =========================================================

    /*
      The visual appearance remains the same, but all nodes can reuse
      this one star texture instead of creating a duplicate texture
      for every skill.
    */

    function createNodeStarTexture() {
      const nodeStarCanvas = document.createElement("canvas");

      nodeStarCanvas.width = 64;
      nodeStarCanvas.height = 64;

      const nodeStarContext =
        nodeStarCanvas.getContext("2d", {
          alpha: true
        });

      const gradient =
        nodeStarContext.createRadialGradient(
          32,
          32,
          0,
          32,
          32,
          32
        );

      gradient.addColorStop(
        0,
        "rgba(255, 255, 200, 1)"
      );

      gradient.addColorStop(
        0.3,
        "rgba(255, 220, 120, 0.8)"
      );

      gradient.addColorStop(
        0.6,
        "rgba(255, 180, 60, 0.5)"
      );

      gradient.addColorStop(
        1,
        "rgba(255, 180, 60, 0)"
      );

      nodeStarContext.fillStyle = gradient;

      nodeStarContext.fillRect(
        0,
        0,
        nodeStarCanvas.width,
        nodeStarCanvas.height
      );

      const texture =
        new THREE.CanvasTexture(nodeStarCanvas);

      texture.minFilter = THREE.LinearFilter;
      texture.magFilter = THREE.LinearFilter;
      texture.generateMipmaps = false;

      return texture;
    }

    const sharedNodeStarTexture =
      createNodeStarTexture();

    // =========================================================
    // LABEL CREATION
    // =========================================================

    function createSkillLabel(text) {
      const labelCanvas =
        document.createElement("canvas");

      const labelContext =
        labelCanvas.getContext("2d", {
          alpha: true
        });

      labelContext.font =
        `${LABEL_FONT_SIZE}px MyCustomFont`;

      const measuredWidth =
        Math.ceil(labelContext.measureText(text).width);

      labelCanvas.width = Math.max(
        2,
        measuredWidth + 20
      );

      labelCanvas.height =
        LABEL_FONT_SIZE + 10;

      /*
        Canvas width/height resets the context, so the font
        must be assigned again.
      */
      labelContext.font =
        `${LABEL_FONT_SIZE}px MyCustomFont`;

      labelContext.textBaseline = "alphabetic";
      labelContext.fillStyle = "#cce6ff";

      labelContext.fillText(
        text,
        5,
        LABEL_FONT_SIZE
      );

      const labelTexture =
        new THREE.CanvasTexture(labelCanvas);

      labelTexture.minFilter = THREE.LinearFilter;
      labelTexture.magFilter = THREE.LinearFilter;
      labelTexture.generateMipmaps = false;

      const labelMaterial =
        new THREE.SpriteMaterial({
          map: labelTexture,
          transparent: true,
          depthWrite: false
        });

      const label =
        new THREE.Sprite(labelMaterial);

      label.position.set(
        0,
        LABEL_FONT_SIZE * 0.2,
        0
      );

      label.scale.set(
        labelCanvas.width * 0.06,
        labelCanvas.height * 0.06,
        1
      );

      return label;
    }

    // =========================================================
    // 3-D FORCE GRAPH
    // =========================================================

    const graphElement =
      document.getElementById("3d-graph");

    const Graph =
      ForceGraph3D({
        controlType: "orbit"
      })(graphElement)
        .graphData(gData)

        .nodeThreeObject((node) => {
          const group = new THREE.Group();

          const starMaterial =
            new THREE.SpriteMaterial({
              map: sharedNodeStarTexture,
              transparent: true,
              depthWrite: false
            });

          const sprite =
            new THREE.Sprite(starMaterial);

          sprite.scale.set(
            STAR_SIZE,
            STAR_SIZE,
            1
          );

          group.add(sprite);

          const label =
            createSkillLabel(node.skill);

          group.add(label);

          node.__threeObj = group;

          return group;
        })

        .linkWidth(1)

        .linkColor(() =>
          "rgba(160, 200, 220, 0.08)"
        )

        .linkOpacity(1)

        .linkDirectionalParticles(1)

        .linkDirectionalParticleWidth(
          PARTICLE_WIDTH
        )

        .linkDirectionalParticleSpeed(
          () => PARTICLE_SPEED
        )

        .linkDirectionalParticleColor(
          () =>
            `rgba(255, 246, 200, ${PARTICLE_OPACITY})`
        )

        .onNodeHover((node) => {
          document.body.style.cursor =
            node ? "pointer" : "default";
        });

    Graph.d3Force("link").distance(45);
    Graph.d3Force("charge").strength(-25);

    // =========================================================
    // ORIGINAL OPENING POSITION
    // =========================================================

    /*
      This is intentionally unchanged so the constellation opens
      from the same original camera position.
    */

    const INITIAL_CAMERA_Z = 900;

    Graph.cameraPosition({
      x: 0,
      y: 0,
      z: INITIAL_CAMERA_Z
    });

    // =========================================================
    // ORBIT CONTROLS
    // =========================================================

    const controls = Graph.controls();
    const camera = Graph.camera();

    controls.enableDamping = true;
    controls.dampingFactor = 0.005;

    controls.zoomSpeed = 0.5;

    controls.minDistance = 150;
    controls.maxDistance = 2000;

    controls.enableRotate = true;
    controls.enablePan = true;
    controls.enableZoom = true;

    controls.screenSpacePanning = true;

    /*
      Preserve the existing center of attention.
    */
    controls.target.set(0, 0, 0);
    controls.update();

    // =========================================================
    // USER-PRIORITY FREE-FLOW CAMERA
    // =========================================================

    let userInteracting = false;
    let lastInteractionEndedAt = 0;

    let cameraDestination =
      new THREE.Vector3();

    /*
      This is the main correction.

      Every destination is generated RELATIVE TO THE CURRENT
      CAMERA POSITION.

      It is not generated from a fixed absolute location.
      Therefore, after user interaction, the camera does not
      return to its previous random destination.
    */
    function pickNewDestinationFromCurrentPosition() {
      const currentPosition =
        camera.position.clone();

      /*
        Horizontal and vertical random flow.
      */
      const offsetX =
        (Math.random() - 0.5) * DRIFT_OFFSET_XY;

      const offsetY =
        (Math.random() - 0.5) * DRIFT_OFFSET_XY;

      /*
        Depth movement is intentionally smaller so zoom changes
        remain softer and less aggressive.
      */
      const offsetZ =
        (Math.random() - 0.5) * DRIFT_OFFSET_Z;

      cameraDestination.set(
        currentPosition.x + offsetX,
        currentPosition.y + offsetY,
        currentPosition.z + offsetZ
      );

      /*
        Respect the same minimum and maximum zoom boundaries.
        The destination is adjusted without changing the user's
        current camera position.
      */
      const destinationFromTarget =
        cameraDestination
          .clone()
          .sub(controls.target);

      let destinationDistance =
        destinationFromTarget.length();

      if (destinationDistance === 0) {
        destinationFromTarget.set(0, 0, 1);
        destinationDistance = 1;
      }

      const safeDistance =
        THREE.MathUtils.clamp(
          destinationDistance,
          controls.minDistance,
          controls.maxDistance
        );

      destinationFromTarget
        .normalize()
        .multiplyScalar(safeDistance);

      cameraDestination
        .copy(controls.target)
        .add(destinationFromTarget);
    }

    /*
      Initial random destination.

      This preserves the existing behavior when the page first opens:
      the graph starts from its original camera position and then
      naturally begins its random movement.
    */
    pickNewDestinationFromCurrentPosition();

    controls.addEventListener(
      "start",
      () => {
        userInteracting = true;

        /*
          Immediately cancel the practical relevance of the previous
          automatic destination.

          The camera is now completely controlled by the user.
        */
        cameraDestination.copy(
          camera.position
        );
      }
    );

    controls.addEventListener(
      "change",
      () => {
        if (!userInteracting) {
          return;
        }

        /*
          Continuously remember the exact camera position selected
          by the user while rotating, panning, or zooming.
        */
        cameraDestination.copy(
          camera.position
        );
      }
    );

    controls.addEventListener(
      "end",
      () => {
        userInteracting = false;
        lastInteractionEndedAt =
          performance.now();

        /*
          The old automatic destination is permanently discarded.

          The next movement begins from the exact position and zoom
          where the user released the mouse or touch gesture.
        */
        pickNewDestinationFromCurrentPosition();
      }
    );

    function autoDrift(currentTime) {
      if (userInteracting) {
        return;
      }

      if (
        currentTime - lastInteractionEndedAt <
        DRIFT_RESUME_DELAY
      ) {
        return;
      }

      /*
        Smoothly approach the fresh destination.

        Because the destination was generated from the current
        user-selected camera position, this does not pull the camera
        back toward an old random point.
      */
      camera.position.lerp(
        cameraDestination,
        DRIFT_SPEED
      );

      /*
        Keep the camera focused on the current OrbitControls target.

        Unlike the previous hard-coded camera.lookAt(0, 0, 0),
        this respects any target adjustment caused by user panning.
      */
      camera.lookAt(controls.target);

      /*
        Select another destination only after naturally approaching
        the current one.
      */
      if (
        camera.position.distanceTo(
          cameraDestination
        ) < 20
      ) {
        pickNewDestinationFromCurrentPosition();
      }
    }

    function animationLoop(currentTime) {
      requestAnimationFrame(animationLoop);
      autoDrift(currentTime);
    }

    requestAnimationFrame(animationLoop);

    // =========================================================
    // RESPONSIVE RESIZING
    // =========================================================

    function resizeGraph() {
      Graph.width(window.innerWidth);
      Graph.height(window.innerHeight);
    }

    window.addEventListener(
      "resize",
      resizeGraph,
      {
        passive: true
      }
    );

    window.addEventListener(
      "orientationchange",
      () => {
        window.setTimeout(
          resizeGraph,
          150
        );
      },
      {
        passive: true
      }
    );

    resizeGraph();

    // =========================================================
    // REFRESH BUTTON
    // =========================================================

    document
      .getElementById("refreshBtn")
      .addEventListener(
        "click",
        () => {
          window.location.reload();
        }
      );
  </script>
</body>
</html>
